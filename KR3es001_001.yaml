body:
  text: 卷之上一天地六位臟象圖二手足陰陽一手足三陰三陽注云肝心脾肺腎皆屬陰五臟也膽胃三焦膀胱大腸小腸皆屬陽六腑也分而言之手足皆有三陰三陽是也二手三陰三陽肺寅燥金手太陰大腸卯燥金手陽明心午君心手少陰小腸未君火手太陽包絡戌相火手厥陰三焦亥相火手少陽三足三陰三陽胃辰濕土足陽明脾巳濕土足太陰膀胱申寒水足太陽腎酉寒水足少陰膽子風木足少陽肝醜風木足厥陰歌曰手經太陽屬小腸膀胱經屬足太陽肝足厥陰手包絡胃足陽明手大腸膽屬少陽足經尋三焦手內少陽臨脾足太陰手經肺腎足少陰手是心三五臟六腑除心包絡十一經脈證法夫人有五臟六腑虛實寒熱生死逆順皆見形證脈氣若非診切無由識也虛則補之實則瀉之寒則溫之熱則涼之不虛不實以經調之此乃良醫之大法也一肝之經肝脈本部在於筋足厥陰風乙木也經曰肝與膽為表裡足厥陰少陽也其經旺於春乃萬物之始生也其氣軟而弱軟則不可汗弱則不可下其脈弦長曰平反此曰病脈實而弦此為太過病在外令人忘忽眩運虛而微則為不及病在內令人胸脅脹滿凡肝實則兩脅下引痛喜怒虛則如人將捕之其氣逆則頭痛耳聾頰赤其脈沉而急浮之亦然主脅支滿小便難頭痛眼眩脈急甚主惡言微急氣在胸脅下緩甚則嘔逆微緩水痹大甚內癰吐血微大筋痹小甚多飲微小痹滑甚㿗疝微滑遺尿澀甚流飲微澀瘲攣肝之積氣在左脅下久而不去發為咳逆或為痎瘧也虛夢花草茸茸實夢山林茂盛肝病旦慧晚甚夜靜肝病頭痛目眩脅滿囊縮小便不通十日死又身熱惡寒四肢不舉其脈當弦而急反短澀者乃金剋木也死不治又肝中寒則兩臂不舉舌燥多太息胸中痛不能轉側其脈左關上遲而澀者是也肝中熱則喘滿多嗔目痛腹脹不嗜食所作不定夢中驚悸眼赤視物不明其脈左關陽實者是也肝虛冷則脅下堅痛目盲臂痛發寒熱如瘧狀不欲食婦人則月水不來氣急其脈左關上沉而弱者是也此寒熱虛實生死逆順之法也主治備要云是動則病腰痛甚則不可俯仰丈夫㿗疝婦人小腹腫甚則嗌乾面塵脫色主肝所生病者胸中嘔逆飧泄狐疝遺溺閉癃病肝苦急急食甘以緩之甘草肝欲散者急食辛以散之川芎補以細辛之辛瀉以白芍藥之酸肝虛以陳皮生薑之類補之經曰虛則補其母水能生木水乃肝之母也苦以補腎熟地黃黃柏是也如無他證惟不足錢氏地黃丸補之實則芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉之二膽之經足少陽風甲木經曰膽者中清之腑也號曰將軍決斷出焉能喜怒剛柔與肝為表裡也足少陽是其經也虛則傷寒恐畏頭眩不能獨臥實則傷熱驚悸精神不守臥起不定玄水發其根在膽又肝咳不已則傳邪入膽嘔青汁也又膽有水則從頭腫至足也膽病則善太息口苦吐宿汁心中戚戚恐如人將捕之咽中介介然數唾又睡臥則脅下痛口苦多太息邪氣客於膽則夢鬥訟脈在左關上浮而得之者是其部也膽實熱則精神不守膽熱則多腫膽冷則多眠又左關上脈陽微者膽虛陽數者膽實陽虛者膽絶也以上皆虛實寒熱生死脈證之法也主治備要云是動則病口苦善太息胸脅痛不能轉側甚則面微有塵體無膏澤足外反熱是為陽厥是主膽所生病者頭痛頷腫目鋭眥痛缺盆中腫痛腋下腫馬刀挾癭汗出振寒瘧胸肋脅髀膝外至脛絶骨外踝前及諸節皆痛脈訣云左關肝與膽脈之所生也先以輕手得之是膽屬表後以重手取之是肝屬裡也肝合筋肝脈循經而行持脈指法如十二菽之重按至筋平脈道如箏弦者為弦脈道迢迢者為長此弦長乃肝家不病之狀也肝脈本部在筋若出筋上見於皮膚血脈之間者是其浮也入於筋下見於骨上是其沉也臨病細推之舉一知十之道也三心之經心脈本部在於血手少陰君丁火也經曰心者五臟之尊也號帝王之稱也與小腸通為表裡神之所舍又主於血屬火旺於夏手少陰太陽是其經也凡夏脈鉤來盛去衰故曰鉤反此者病來盛去亦盛為太過病在外來衰去亦衰為不足病在內太過令人身熱而骨痛口瘡而舌焦引水不及令人躁煩上為咳唾下為氣泄其脈如循琅玕如連珠曰平來而啄啄連屬其中微曲曰病脈來前曲後倨如操帶鉤曰死思慮過多則怵惕怵惕則傷心心傷則神失神失則恐懼又真心痛手足寒而過節則旦占夕死又心有水氣身腫不得臥煩躁心中風則吸吸發熱不能行立飢而不能食食則嘔吐夏心脈旺左手寸口浮大而散曰平反此則病若沉而滑者水來剋火十死不治長而弦者木來歸子不治自愈緩而大者土來入火為微邪相干無所害心病則胸中痛脅滿脹肩背臂膊皆痛虛則多驚悸惕惕然無眠胸腹及腰背引痛喜悲心積氣久不去則苦煩心中痛實則笑不休夢火發心氣盛則夢喜笑及恐畏邪氣客於心則夢煙火心脹氣短夜臥不寧懊憹氣逆往來腹中熱喜水涎出心病日中慧夜半甚平旦靜又左手脈大手熱腋腫大甚胸中滿而煩淡淡大動面赤目黃也心病先心痛時刻不止關格不通身重不已三日死心虛甚則畏人瞑目欲眠精神不守魂魄妄行心脈沉之小而緊浮之不喘苦心下氣堅食不下喜咽唾手熱煩滿多忘太息此得之思慮太過也其脈急甚瘛瘲微急則心中痛引前後胸背不下食緩甚則痛引背善淚小甚則噦微小則消疸滑甚則為渴微滑則心疝引臍腹鳴澀甚諳不語又心脈堅搏而長主舌強不能言軟而散當懾怯不食也又急甚則心疝臍下有病形煩悶少氣大熱上煎又心病狂言汗出如珠身厥冷其脈當浮而大反沉濡而滑其色當赤而反黑者水剋火不治十死又心積沉之空空上下往來無常處病胸滿悸腹中熱面頰赤咽乾躁煩掌熱甚則吐血夏瘥冬甚宜急療之止於旬日也又赤黑色入口必死也面目赤色亦死赤如衃血亦死又憂恚思慮太過心氣內去其色反和而盛者不出十日死扁鵲云心絶一日死色見凶多人雖健敏號曰行尸一年之中禍必至矣又其人語聲前寬後急後聲不接前聲其聲濁惡其口不正冒昧善笑此風入心也又心傷則心損手足不遂骨節離解舒緩不自由利下無休此病急宜治之不過十日而亡矣又笑不休呻而復憂此水乘火也陰擊於陽陰起陽伏伏則熱熱生狂冒譫亂妄言不可採問心已損矣扁鵲云其人唇口赤色可治青黑色即死又心瘧則先煩而後渴翕翕發熱也其脈浮緊而大是也心氣實而大便不利腹滿身熱而重溫溫欲吐吐而不出喘息急不安臥其脈左寸口與人迎皆實大者是也心虛則恐悸多驚憂思不樂胸腹中苦痛言語戰栗惡寒恍惚面赤目黃喜血衄其脈左寸口虛而微者是也此心臟寒熱虛實生死逆順脈證也主治備要云是動則病嗌乾心痛渴而欲飲是為臂厥主心所生病者目黃心脅痛臑臂內後廉痛厥掌中熱痛心苦緩以五味子之酸收之心欲軟軟以芒硝之咸補以澤瀉之咸瀉以人參甘草黃耆之甘心虛則以炒鹽補之虛則補其母木能生火肝乃心之母肝母生心火也以生薑補肝如無他證錢氏安神丸是也實則甘草瀉之如無他證錢氏方中重則瀉心湯輕則導赤散是也四小腸經手太陽丙火小腸者受盛之腑也與心為表裡手太陽是其經也小腸絶者六日死絶則髮直如麻汗出不已不能屈伸又心病傳小腸小腸咳則氣咳氣咳一齊出也小腸實則傷熱傷熱則口瘡生虛則傷寒傷寒則泄膿血或泄黑水其根在小腸也小腸寒則下腫重有熱久不出則漸生痔有積則夕發熱而旦止病氣發則使人腰下重食則窘迫而便難是其候也小腸脹則小腹䐜脹引腰而痛厥邪入小腸則夢聚井邑中或咽痛頷腫不可回首肩似拔臑似折也又曰心者主也神之舍也其臟固密而不易傷傷則神去神去則心死矣故人心多不病病即死不可治也惟小腸受病多也又左寸口陽絶者則無小腸脈也六日死有熱邪則小便赤澀實則口生瘡身熱往來心中煩悶身重小腸主於舌之官也和則能言而機關利健善別其味也虛則左寸口脈浮而微軟弱不禁按病驚懼狂無所守心下空空然不能言語者此小腸虛實寒熱生死逆順脈證之法也主治備要云是動氣也則病嗌痛頷腫不可以顧肩似拔臑似折是主液血所生病者耳聾目黃頰腫頸頷肩臑肘臂外後廉痛脈訣云左寸小腸心脈之所出也先以輕手得之是小腸屬表後以重手得之是心屬裡心合血脈心脈循血脈而行持脈指法如六菽之重按至血脈而得者為浮稍稍加力脈道粗大者為大又稍稍加力脈道潤軟者為散此乃浮大而散心家不病脈之狀也心脈本部在於血脈若出於血脈之上見於皮膚之間是其浮也入於血脈之下見於筋骨之分是其沉也五脾之經脾脈本在肌肉足太陰濕己土經曰脾者土也諫議之官主意與智消磨五穀寄在胸中養於四旁旺於四季正主長夏與胃為表裡足太陰陽明是其經也扁鵲云脾病則面黃色痿實則舌強直不嗜食嘔逆四肢緩虛則多澼喜吞注痢不已又脾虛則精不勝元氣乏力手足緩弱不能自持其脈來似流水曰太過病在外也如鳥距曰不及病在內太過令人四肢沉重言語謇澀不及令人中滿不食乏力手足緩弱不遂涎引口中四肢腫脹溏泄不時夢中飲食脾脈來而和柔者如雞踐地曰平來實而滿稍數如雞舉足曰病又如鳥之啄如鳥之距如屋之漏曰死中風則翕翕發熱狀如醉人腹中煩滿皮肉瞤瞤而起其脈阿阿然緩曰平反弦急者肝來克脾也真鬼相遇大凶之兆也又微澀而短者肺乘於脾不治自愈又沉而滑者腎來乘脾亦為不妨又浮而洪心來生脾不為疾耳脾病色黃體重失便目直視唇反張爪甲青四肢沉吐食百節疼痛不能舉其脈當浮大而緩今反弦急其色青死不治又脾病其色黃飲食不消心腹脹滿體重節痛大便硬小便不利其脈微緩而長者可治脾氣虛則大便滑小便利汗出不止五液注下為五色注痢下也又積在其中久不愈四肢不收黃疸食不為肌膚氣滿脹喘喘而不定也脾實則時夢築牆垣蓋屋盛則夢歌樂虛則夢飲食不足厥邪客於脾則夢大澤丘陵風雨壞屋脾脹則善噦四肢急體重不食善噫脾病日昳慧平旦甚日中持下晡靜脈急甚則瘛瘲微急則膈中不利食不下而還出緩甚則痿厥微緩則風痿四肢不收大甚則暴僕微大則痹疝氣裹大膿血在腸胃之外小甚則寒熱作微小則消疸滑甚則頽疝微滑則蟲毒腸鳴中熱澀甚則腸㿗微澀則內潰下膿血脾脈至大而虛則有積脾氣絶則十日死唇焦枯無紋理面青黑者脾先死脾病面黃目赤者可治青黑色入口半年死色如枳實者一日死吉凶休咎皆見其色出於部分也又口噤唇青四肢重如山不能自持大小便利無休歇飲食不入七日死又唇雖痿黃語聲囀囀者尚可治脾病水氣久不去腹中痛鳴徐徐熱汗出其人本意寬緩今反急怒語而鼻笑不能答人此不過一日禍必至矣又脾中寒熱則使人腹中痛不下食病甚舌強語澀轉筋卵縮陰股腹中引痛身重不思食膨脹變則水泄不能臥者十死不治脾土熱則面黃目赤季脅痛滿寒則吐涎沫而不食四肢痛滑泄不已手足厥甚則戰栗如瘧也臨病之時切要明察脈證然後投藥此脾臟虛實寒熱生死逆順脈證之法也主治備要云是動則病舌本強食則嘔胃脘痛腹脹善噫得後與氣則快然如衰身體皆重主脾所生病者舌本痛體不能動搖食不下煩心心下急痛寒瘧溏瘕泄水閉黃疽不能臥強立股膝內腫厥足大指不用脾苦濕急食苦以燥之白朮脾虛則以甘草大棗之類補之實則以枳殼瀉之如無他證虛則以錢氏益黃散實則以瀉黃散心乃脾之母炒鹽補之肺乃脾之子桑白皮瀉之六胃之經足陽明濕戊土胃者脾之腑也又名水谷之海與脾為表裡胃者人之根本胃氣壯則五臟六腑皆壯也足陽明是其經也胃氣絶五日死實則中脹便難肢節痛不下食嘔逆不已虛則腸鳴脹滿滑泄寒則腹中痛不能食冷物熱則面赤如醉人四肢不收持不得安眠語狂㲋亂便硬者是也病甚則腹脅脹滿嘔逆不食當心痛下上不通惡聞香臭嫌人語振寒善缺伸胃中熱則唇黑熱甚則登高而歌棄衣而走顛狂不定汗出額上鼽衄不止虛極則四肢腫滿胸中短氣穀不化中滿也胃中風則溏泄不已胃不足則多飢不消食病人鼻下平則胃中病渴者可治胃脈搏堅而長其色黃赤者當病折髀其脈弱而散者病食痹右關上浮而大者虛也浮而短澀者實也浮而微滑者亦實也浮而遲者寒也浮而數者熱也此胃腑虛實寒熱生死逆順脈證之法也主治備要云是動則病淒滄振寒善呻數缺顏黑病至則惡人與火聞木聲則惕然而驚心欲動獨閉戶塞牖而處甚則登高而歌棄衣而走賁響腹脹是為骭厥脈訣云右關上脾胃脈之所出也先以輕手得之是胃屬表後以重手得之是脾屬裡脾合肌肉脾脈循肌肉而行持脈指法如九菽之重按至肌肉脈道如微風輕揚柳梢者為緩又稍稍加力脈道敦實者為大此為緩大脾家不病脈之狀也脾脈本部在肌肉若出於肌肉之上見於皮毛之間者是其浮也入於肌肉之下見於筋骨之分者是其沉也七心包絡手厥陰為母血是動則病手心熱肘臂攣急腋腫甚則胸脅支滿心中憺憺大動面赤㲋黃喜笑不休是主脈所生病者煩心心痛掌中熱治法與小腸同八三焦手少陽為父氣三焦者人之三元之氣也號曰中清之腑總領五臟六腑榮衛經絡內外左右上下之氣也三焦通則上下內外左右皆通也其於灌體周身和內調外榮養左右宣通上下莫大於此也又名玉海水道上則曰三管中則曰霍亂下則曰走泄名雖三而歸其有其名而無其形亦號孤獨之府而衛出於上榮出於中上者絡脈之系也中者經脈之系也下者水道之系也亦又屬膀胱之宗始主通陰陽調虛實呼吸有病則善腹脹氣滿小腹堅溺而不得大便窘迫也溢則作水留則作脹手少陽是其經也又上焦實熱則額汗出而身無汗能食而氣不利舌乾口焦咽閉之類腹脹肋脅痛寒則不入食吐酸水胸背引痛嗌乾津不納也實則食已而還出膨膨然不樂虛則不能制下遺溺頭面腫也中焦實熱則下上不通腹脹而喘下氣不上上氣不下關格不利也寒則下利不止飲食不消中滿虛則腸鳴膨膨也下焦實熱則小便不通大便亦難苦重痛也虛寒則大小便泄下不止也三焦之氣和則內外和逆則內外逆也故云三焦者人之三元之氣也此三焦虛實寒熱生死逆順之法也主治備要云是動則病耳聾渾渾焞焞嗌腫喉痹是主氣所生病者汗出目鋭眥痛頰痛耳後肩臑肘臂外皆痛小指次指不用脈訣云右尺三焦命門脈之所出先以輕手得之是三焦屬表後以重手得之是命門屬裡也上焦熱涼膈散瀉心湯中焦熱調胃承氣湯瀉脾散下焦熱大承氣湯三才封髓丹氣分熱柴胡飲子白虎湯血分熱桃仁承氣湯清涼飲子通治其熱之氣三黃丸黃連解毒湯是也九肺之經肺之脈本部在於皮毛手太陰燥辛金經曰肺者魄之舍也生氣之源號為相傅乃五臟之華蓋也外養皮毛內榮腸胃與大腸為表裡手太陰陽明是其經也肺氣通於鼻和則知其香臭有病則善咳鼻流清涕凡虛實寒熱則皆使人喘嗽實則夢刀兵恐懼肩息胸中滿虛則寒熱喘息利下少氣力多悲感旺於秋其脈浮而毛曰平又浮而短澀者肺脈也其脈來毛而中央堅兩頭虛曰太過則令人氣逆胸滿背痛不及令人喘呼而咳上氣見血又肺脈來厭厭聶聶如循榆莢曰平來如循雞羽曰病來如物之浮如風吹鳥背上毛者死真肺脈至大而虛如以毛羽中人皮膚其色白赤不澤其毛折者死微毛曰平毛多曰病毛而弦者春病弦甚者即病又肺病吐衄血皮熱脈數頰赤者死又久咳而見血身熱而短氣脈當澀而今反浮大色當白而今反赤者火剋金十死不治肺病喘咳身寒脈遲微者可治秋旺於肺其脈多浮澀而短曰平反此為病又反洪大而長是火刑金亦不可治反得沉而軟滑者腎乘於肺不治自愈反浮大而緩者是脾來生肺不治自瘥反弦而長者是肺被肝橫為微邪雖病不妨虛則不能息身重實則咽嗌乾喘嗽上氣肩背痛有積則脅下脹滿痛中風則口燥而喘身運而重形似冒而腫其脈按之虛弱如蔥葉下無根者死中熱則唾血其脈細緊浮數芤者皆主失血此由躁擾嗔怒勞傷得之氣壅結所為也肺脹則其人喘咳而目如脫其脈浮大者是也又肺痿則吐涎沫而咽乾欲飲者欲愈不飲者未瘥又咳而遺小便者上虛不能制其下故也其脈沉澀者病在內浮滑者病在外肺死則鼻孔開而黑枯喘而目直視也肺絶則十二日死其狀腹滿泄利不覺出面白目青此為亂經雖天命亦不可治又飲酒當風中於肺咳嗽喘悶見血者不可治也面黃目白亦不可治也肺病頰赤者死又言諳喘急短氣好唾此為真鬼相害十死十百死百大逆之兆也又陽氣上而不降燔於肺肺自結邪脹滿喘急狂言瞑目非當所說而口鼻張大小便俱脹飲水無度此因熱傷於肺肺化為血半年死又肺瘧使人心寒寒甚則發熱寒熱往來休作不定多驚咳喘如有所見者是也其脈浮而緊又滑而數又遲而澀小皆為肺瘧之脈也又其人素聲清而雄者暴不響亮噎而氣短用力言語難出視不轉睛雖未為病其人不久肺病實則上氣喘悶咳嗽身熱脈大是也虛則力乏喘促右脅脹言語氣短者是也乍寒乍熱鼻塞頤赤面白皆肺病之象也此肺臟虛實寒熱生死逆順脈證法也主治備要云是動則病肺脹滿膨膨而喘咳缺盆中痛甚則交兩手而瞀此為臂厥是主肺所生病者咳嗽上氣喘渴煩心胸滿臑臂內前廉痛厥掌中熱氣盛有餘則肩背痛風寒汗出中風小便數而缺氣虛則肩背痛寒少氣不足以息溺色變遺矢無度肺苦氣上逆黃芩肺欲收以酸白芍藥也補以五味子之酸瀉以桑白皮之辛虛則五味子補之實則桑白皮瀉之如無他證錢氏瀉白散虛則用阿膠散虛則補其母則以甘草補土實則瀉其子以澤瀉瀉腎水十大腸經手陽明燥庚金經曰大腸者肺之腑也傳道之司號監倉之官肺病久則傳入大腸手陽明是其經也寒則泄熱則結絶則利下不止而死熱極則便血又風中大腸則下血又實熱則脹滿而大便不通虛寒則滑泄不止大腸者乍虛乍實乍來乍去寒則溏泄熱則後重有積物則發寒栗而戰熱則發渴如瘧狀積冷不去則當臍痛不能久立痛已則泄白物是也虛則喜滿喘嗽咽中如核妨矣此乃大腸虛實寒熱生死逆順脈證之法也主治備要云是動則病齒痛頸腫是主津液所生病者目黃口乾鼽衄喉痹肩前臑痛大指次指痛不用氣有餘則當脈所過者熱腫虛則寒栗不復脈訣云右寸大腸肺脈之所出也先以輕手得之是大腸屬表後以重手得之是肺屬裡肺合皮毛肺脈循皮毛而行持脈指法如三菽之重按至皮毛而得之者為浮稍稍加力脈道不利為澀又稍加力脈道縮入關中上半指不動下半指微動者為短此乃浮澀而短肺不病之狀也肺脈本部出於皮毛之上見於皮膚之表是其浮也入於血脈肌肉之分是其沉也十一腎之經命門腎脈本部在足少陰寒癸水經曰腎者精神之舍性命之根外通於耳男子以藏精女子以系胞與膀胱為表裡足少陰太陽是其經也腎氣絶則不盡天命而死也旺於冬其脈沉滑曰平反此者病其脈來如彈石名曰太過病在外其去如解索謂之不及病在內太過令人解㑊脊痛而少氣不欲言不及則令人心懸小腹滿小便滑變黃色又腎脈來喘喘纍纍如鉤按之緊曰平又來如引葛按之益堅曰病來如轉索辟辟如彈石曰死又腎脈但石無胃氣亦死腎有水則腹脹臍腫腰重痛不得溺陰下濕如同牛鼻頭汗出足為逆寒大便難腎病手足冷面赤目黃小便不禁骨節煩疼小腹結瘀熱氣上衝心脈當沉細而滑今反浮大其色當黑今反黃其人吸吸少氣兩耳若聾精自出飲食少便下清穀脈遲可治冬則脈沉而滑曰平反浮大而緩是土來剋水大逆十死不治反浮澀而短是肺來乘腎雖病易治反弦細而長者肝來乘腎不治自愈反浮大而洪心來乘腎不妨腎病腹大脛腫喘咳身重寢汗出憎風虛則胸中痛陰邪入腎則骨痿腰痛上引背脊痛過房汗出當風浴水久立則腎損其脈急甚則病痿微急則沉厥奔豚足不收緩甚則虛損微緩則洞泄食不下入咽還出大甚則陰痿微大則水氣起臍下其腫埵埵然而上至胸者死不治小甚則亦洞泄微小則消疸滑甚則癃㿗微滑則骨痿坐不能起目視見花澀甚則寒壅塞微澀則不月痔疾其脈之至也堅而大有積氣在陰中及腹內也名曰腎痹得之浴清水臥濕地來沉而大堅浮之而緊手足腫厥陰痿不起腰背痛小腹腫心下有水氣時脹滿而洞泄此因浴水未乾而房事得之也虛則夢舟船溺人得其時夢伏水中若有所畏實則夢臨深投水中腎脹則腹痛滿引脊腰痹痛腎病夜半平四季甚下晡靜腎生病口熱舌乾咽腫上氣嗌乾及痛煩心而痛黃疸腸癖痿厥腰脊背急痛嗜臥足心熱而痛胻酸腎病久不愈而膂筋疼小便閉而兩脅脹滿目盲者死腎之積苦腰脊相引而痛飢見飽減此腎中寒結在臍下也積脈來細而軟附於骨者是也面白目黑腎已內傷八日死又陰縮小便不出出而不止者亦死又其色青黃連耳其人年三十許百日死若偏在一邊一年死實則煩悶臍下重熱則口舌焦而小便澀黃寒則陰中與腰背俱腫疼面黑耳聾乾嘔而不食或嘔血者是也又喉鳴坐而喘咳唾血出亦為腎虛寒氣欲絶者此腎臟虛實寒熱生死逆順脈證之法也主治備要云是動則病飢不欲食面如漆柴咳唾則有血喝喝而喘坐而欲起目䀮䀮如無所見心如懸若飢狀氣不足則善恐心惕惕然如人將捕之是為骨厥是主腎所生病者口熱舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼脊股內後廉痛痿厥嗜臥足下熱而痛也腎苦燥則以辛潤之知母黃柏是也腎欲堅堅以知母之苦補以黃柏之苦瀉以澤瀉之咸腎虛則以熟地黃黃柏補之腎本無實不可瀉錢氏止有補腎地黃丸無瀉腎之藥肺乃腎之母金生水補母故也又以五味子補之者是也十二膀胱經足太陽寒壬水經曰膀胱者津液之府也與腎為表裡號為水曹掾又名玉海足太陽是其經也總通於五腑所以五腑有疾則應膀胱膀胱有疾即應胞囊也傷熱則小便不利熱入膀胱則其氣急而小便黃澀也膀胱寒則小便數而清白也又水發則其根在膀胱四肢瘦小而腹反大是也又膀胱咳久不已傳之三焦滿而不欲飲食也然上焦主心肺之病人有熱則食不入寒則神不守泄下利不止語聲不出也實則上絶於心氣不行也虛則引熱氣於肺其三焦和則五臟六腑之氣和逆則皆逆膀胱經中有厥氣則夢行不快滿脹則小便不下臍下重悶或肩痛也絶則三日死死在雞鳴也此膀胱虛實寒熱生死逆順脈證之法也主治備要云是動則病氣沖頭痛目似脫項似拔脊痛腰似折髀不可以曲膕如結踹如裂是為踝厥是主筋所生病者痔瘧狂癲疾頭囟項痛目黃淚出鼽衄項背腰尻膕踹腳皆痛足小指不用脈訣云左尺膀胱腎脈之所出也先以輕手得之是膀胱屬表後以重手得之是腎屬裡命門與腎脈循骨而行持脈指法按至骨上得之為沉又重手按之脈道無力者為濡舉手來疾流利者為滑此乃沉濡而滑命門與腎脈不病之狀也命門與腎部近骨若出於骨上見於皮膚血脈筋骨之間是其浮也入而至骨是其沉也四三才治法華氏石函經曰夫病有宜湯者宜丸者宜散者宜下者宜吐者宜汗者湯可以蕩滌臟腑開通經絡調品陰陽丸可以逐風冷破堅積進飲食散可以去風寒暑濕之氣降五臟之結伏開腸利胃可下而不下使人心腹脹滿煩亂鼓脹可汗而不汗則使人毛孔閉塞悶絶而終可吐而不吐則使人結胸上喘水食不入而死五三感之病內經治法云天之邪氣感則害人五臟肝心脾肺腎實而不滿可下之而已水穀之寒熱感則害人六腑膽胃三焦膀胱大腸小腸滿而不實可吐之而已地之濕氣感則害人肌膚從外而入可汗而已六四因之病注云外有風寒暑濕天之四令無形者也內有飢飽勞逸亦人之四令有形者也一者始因氣動而內有所成者謂積聚癥瘕瘤氣癭氣結核狂瞀癲癇二者始因氣動而外有所成者謂癰腫瘡瘍疥癩疽痔掉瘈浮腫目赤熛疹者痓胕腫痛癢三者不因氣動而病生於內者謂留飲癖食飢飽勞逸宿食霍亂悲恐喜怒想慕憂結四者不因氣動而病生於外者謂瘴氣魅賊蟲蛇蠱毒蜚尸鬼擊沖薄墜墮風寒暑濕斫射刺割等七五郁之病注云五運之法也木鬱之病肝酸木風注云故民病胃脘當心而痛四肢兩脅咽鬲不通飲食不下甚則耳鳴眩轉目不識人善暴僵仆筋骨強直而不用卒倒而無所知也經曰木鬱則達之謂吐令其調達也火鬱之病心苦火暑注云故民病少氣瘡瘍癰腫脅腹胸背面首四肢䐜膹臚脹瘍痱嘔逆瘛瘲骨痛節乃有動注下溫瘧腹中暴痛血溢流注精液乃少目赤心熱甚至瞀悶懊憹善暴死經曰火鬱發之謂汗令其發散也土鬱之病脾甘土濕注曰故民病心腹脹腸鳴而為數便甚則心痛脅䐜嘔吐霍亂飲發注下胕腫身重則脾熱之生也經曰土鬱奪之謂下之令無壅滯也金鬱之病肺辛金燥注云故民病咳逆心脅滿引少腹善暴痛不可反側嗌乾面塵色惡乃金勝木而病也經曰金鬱泄之解表利小便也水鬱之病腎咸水寒注云故民病寒客心痛腰椎痛大關節不利屈伸不便善厥逆痞堅腹滿陰乘陽也經曰水鬱折之謂抑之制其沖逆也五運之政猶權衡也高者抑之下者舉之化者應之變者復之此生長化收藏之理也失常則天地四塞也八六氣主治要法大寒醜上初之氣自大寒至春分厥陰風木之位一陽用事其氣微故曰少陽得甲子元頭常以大寒初交之氣分以六周甲子以應六氣下十二月正月二月少陽三陰三陽亦同注云初之氣為病多發咳嗽風痰風厥涎潮痹塞口喎半身不遂失音風癲風中婦人胃中留飲臍腹微痛嘔逆噁心旋運驚悸陽狂心風搐搦顫掉初之氣依內經在上者宜吐在下者宜下春分卯上二之氣春分至小滿少陰君火之位陽氣動清明之間有陽明之位也注云二之氣為病多發風濕風熱經曰風傷於陽濕傷於陰微則頭痛身熱發作風濕之候風傷於血也濕傷於胃氣也是以風濕為病陰陽俱虛而脈浮汗出身重眠多鼻息語言難出以上二證不宜熱藥下之必死二之氣病宜以桂枝麻黃湯發汗而已小滿以上三之氣小滿至大暑少陽相火之位陽氣發萬物俱盛故云太陽旺其脈洪大而長天氣並萬物人脈盛注云三之氣為病多發熱皆傳足經者多矣太陽陽明少陽太陰厥陰少陰太陽者發熱惡寒頭項痛腰背強陽明者肌痛目痛鼻乾不得臥少陽胸脅痛耳聾口苦寒熱往來而嘔此三陽屬熱太陰者腹滿咽乾手足自溫自利不渴或腹滿時痛少陰口燥舌乾而渴厥陰煩滿舌卷囊縮喘熱悶亂四肢厥冷爪甲青色三之氣病宜下清上涼及溫養不宜用巴豆熱藥下之大暑未上四之氣大暑至秋分太陰濕土之位陽氣發散之後陰已用事故曰太陰旺此三陰三陽與天氣標本陰陽異矣脈緩大而長燥金旺緊細短澀以萬物乾燥明可見矣注云四之氣為病多發暑氣頭痛身熱發渴不宜作熱病治宜以白虎湯得此病不傳染次發脾泄胃泄大腸泄小腸泄大瘕泄霍亂吐瀉白利及赤白相雜米穀不消腸鳴切痛面浮足腫目黃口乾脹滿氣痞手足無力小兒亦如之四之氣病宜滲泄五苓之類是也秋分酉上五之氣秋分至小雪陽明燥金之位陽衰陰盛故曰金氣旺其脈細而微注云五之氣為病多發喘息嘔逆咳嗽及婦人寒熱往來㾬瘧疸痔消渴中滿小兒斑疹痘瘡五之氣病宜以大柴胡湯解治表裡小雪亥上終之氣小雪至大寒太陽寒水之位陰極而盡天氣所收故曰厥陰旺厥者極也其脈沉短而微萬物收藏在內寒氣閉塞膚腠氣液不能越故脈微也注云終之氣為病多發風寒風痰濕痹四肢不收秋盡冬水復旺水濕相搏肺氣又衰冬寒甚故發則收引病厥痿弱無以運用水液澄徹清冷大寒之疾積滯瘕塊寒疝血瘕終之氣病宜破積發汗之藥是也九主治心法一隨證治病用藥頭痛須用川芎如不愈各加引經藥太陽蔓荊陽明白芷少陽柴胡太陰蒼朮少陰細辛厥陰吳茱萸頂巔痛用藁本去川芎肢節痛用羌活風濕亦用之小腹痛用青皮桂茴香腹痛用芍藥惡寒而痛加桂惡熱而痛加黃柏腹中窄狹用蒼朮麥芽下部腹痛川楝子腹脹用薑製厚朴紫草腹中實熱用大黃芒硝心下痞用枳實黃連肌熱去痰用黃芩肌熱亦用黃耆虛熱用黃耆亦止虛汗脅下痛往來寒熱用柴胡胃脘痛用草豆蔻氣刺痛用枳殼看何經分以引經藥導之眼痛不可忍者用黃連當歸根以酒浸煎莖中痛用甘草梢脾胃受濕沉困無力怠惰嗜臥去痰用白朮枳實半夏防風苦參澤瀉蒼朮破滯氣用枳殼高者用之能損胸中至高之氣三二服而已陳皮韭白木香白豆蔻茯苓調氣用木香香附子丁檀沉補氣用人參用膏粳米去滯氣用青皮多則瀉元氣破滯血用桃仁蘇木紅花茜根玄胡索郁李仁補血不足用甘草當歸阿膠和血用當歸凡血受病皆用血刺痛用當歸詳上下用根梢上部血防風使牡丹皮剪草天麥二門冬中部血黃連使下部血地榆使新血紅色生地黃陳血瘀色熟地黃去痰用半夏熱痰加黃芩風痰加南星胸中寒邪痞塞用陳皮白朮然多則瀉脾胃嗽用五味杏仁貝母去上焦濕及熱須用黃芩瀉肺火故也去中焦濕與痛用黃連瀉心火故也去下焦濕腫及痛並膀胱火必用漢防己草龍膽黃柏知母渴者用干葛茯苓天花粉烏梅禁半夏心煩用梔子仁牛黃硃砂犀角茯苓飲水多致傷脾用白朮茯苓豬苓喘用阿膠宿水不消用黃連枳殼水瀉用白朮茯苓芍藥腎燥香豉瘡痛不可忍者用苦寒藥如黃芩黃連詳上下分根梢及引經藥則可小便黃用黃柏澀者加澤瀉餘瀝者杜仲驚悸恍惚用茯神金虎睛珠凡春加防風升麻夏加黃芩知母白芍藥秋加澤瀉茯苓冬加桂桂枝凡用純寒純熱藥必用甘草以緩其力也寒熱相雜亦用甘草調和其性也中滿者禁用經曰中滿勿食甘二用藥凡例凡解利傷風以防風為君甘草白朮為佐經曰辛甘發散為陽風宜辛散防風味辛乃治風通用故防風為君甘草白朮為佐凡解利傷寒以甘草為君防風白朮為佐是其寒宜甘發散也或有別證於前隨證治病藥內選用其分兩以君臣論凡水瀉茯苓白朮為君芍藥甘草佐之凡諸風以防風為君隨證加藥為佐凡嗽以五味子為君有痰者半夏為佐喘者阿膠為佐有熱無熱俱用黃芩為佐但分兩多寡不同耳凡小便不利黃柏知母為君茯苓澤瀉為使凡下焦有濕草龍膽漢防己為君黃柏甘草為佐凡痔漏以蒼朮防風為君甘草芍藥為佐詳別證加減凡諸瘡以黃連為君甘草黃芩為佐凡瘧疾以柴胡為君隨所發之時所屬之經分用引經藥佐之以上皆用藥之大要更詳別證於前隨證治病藥內逐款加減用之三解利外感傷風者惡風用防風二錢麻黃一錢甘草一錢如頭痛加川芎一錢項下脊旁至腰病者羌活一錢體沉重製蒼朮一錢肢節痛羌活一錢目痛鼻乾及痛升麻一錢或乾嘔或寒熱或脅下痛者俱加柴胡一錢傷寒惡寒者麻黃二錢防風一錢炙甘草一錢頭沉悶者羌活一錢傷寒表熱服石膏知母甘草滑石蔥豉之類寒藥汗出即解如熱病半在表半在裡服小柴胡湯能令汗出而愈者熱甚服大柴胡湯之下更甚者小承氣湯下之裡熱大甚者調胃承氣湯下之或大承氣湯下之發黃者茵陳湯下之結胸中陷胸湯下之此皆大寒之利藥也又言身惡寒麻黃湯汗泄之熱去身涼即愈四傷寒熱食物傷西瓜冷水牛乳寒濕之物白朮二錢川烏半錢防風一錢丁香一個炙甘草一錢傷羊肉面馬乳皆濕熱之物白朮一錢黃連一錢大黃二錢炙甘草半錢制黃芩一錢以上二證腹痛加白芍藥一錢心下痞枳實一錢腹脹厚朴半錢胸中不利枳殼半錢腹中寒陳皮三分渴者白茯苓一錢腹中窄狹蒼朮一錢肢體沉重製蒼朮一錢因怒而傷者甘草半錢因憂而傷者枳殼半錢因喜而傷者五味子半錢因悲而傷者人參半錢大抵傷冷物以巴豆為君傷熱物以大黃為君詳認病證添加為佐之藥或丸或散均可也五目疾目疾暴發赤腫羌活防風柴胡香白芷升麻二制黃芩黃連甘草白睛紅白豆蔻少許則當歸為主去翳穀精花蟬蛻瞿麥秦皮洗養目血菊花明目蕤仁蜀椒龍腦凡眼暴發赤腫以防風黃芩為君以瀉火和血為佐黃連當歸是也兼以各經藥引之凡目昏暗以熟地黃當歸根為君以羌活防風甘菊花甘草之類為佐六瀉痢水泄凡痢疾腹痛以白芍藥甘草為君當歸白朮為佐見血先後分三焦熱論凡瀉痢小便白不澀為寒赤澀為熱也又法曰完穀不化而色不變吐利腥穢澄徹清冷小便清白不澀身涼不渴脈細而微者寒證也穀雖不化而色變非白煩渴小便赤黃而或澀者熱證也凡穀消化無問他證及色變便為熱也寒泄而穀消化者未之有也瀉痢白朮甘草水瀉米穀不化防風傷食微加大黃腹脹厚朴渴者白茯苓腹痛白芍藥甘草為主冬月白芍藥一半白朮一半夏月制黃芩先見膿血後見大便者黃柏為君地榆佐之膿血相雜而下者製大黃先大便而後膿血者黃芩二制皆以當歸根梢詳其上下而用之腹不病白芍藥半之身體困倦目不欲開口不欲言黃耆人參沉重者製蒼朮不思飲食者木香藿香葉裡急大黃芒硝甘草下之後重者木香藿香檳榔和之七中風手足不遂者中府也病在表也當先發汗羌活防風升麻柴胡甘草各二錢作一服取發汗然後行經養血當歸秦艽甘草獨活各一兩行經者隨經用之耳聾目瞀及口偏邪中藏也病在裡也當先疏大便然後行經白芷柴胡防風獨活各一兩又川芎半兩薄荷半兩上為末煉蜜丸彈子大每服一丸細嚼溫酒下茶清亦可八破傷風脈浮在表當汗之脈沉在裡當下之背後搐者羌活防風獨活甘草向前搐者升麻白芷防風獨活甘草兩傍搐者柴胡防風甘草右搐者白芷加之九破傷中風法經曰凡瘡熱甚鬱結而榮衛不得宣通故多發白痂是時瘡口閉塞氣不通泄熱甚則生風也治法曰破傷中風風熱燥甚怫鬱在表而裡氣尚平者善伸數缺筋脈拘急或時惡寒而搐脈浮數而弦者以辛熱治風之藥開沖結滯榮衛宣通而愈也凡用辛熱之藥或以寒涼之藥佐之尤妙免致藥不中病而風轉甚若破傷中風表不已而漸入於裡則病勢轉甚若里未太甚而脈在肌肉者宜以退風熱開結滯之寒藥調之或以微加治風辛熱藥亦得以意消息不可妄也至寶丹亦涼藥也如熱甚於里以大承氣湯下之十瘡瘍苦寒為君黃芩黃柏黃連知母生地黃酒洗甘溫為佐黃耆人參甘草大辛解結為臣連翹當歸藁本辛溫活血去瘀當歸梢蘇木紅花牡丹皮脈浮者為在表宜行經黃連黃芩連翹當歸人參木香檳榔黃柏澤瀉在腰以上至頭者枳殼仍作引藥引至瘡所出毒消腫鼠黏子排膿肉桂入心引血化經汗而不潰傷皮王瓜根三稜莪朮黃藥子痛甚芩連柏知母脈沉者在裡當疏利臟腑利後用前藥中加大黃取利為度隨虛實定分兩痛者止以當歸黃耆止之十一婦人産婦臨月未誕者凡有病先以黃芩白朮安胎然後用治病藥發熱及肌熱者黃連黃芩黃耆人參腹痛者白芍藥甘草感冒者依前解利産後諸病忌用白芍藥黃芩柴胡內惡物上衝胸脅痛者大黃桃仁血刺痛者當歸內傷發熱黃連渴者白茯苓一切諸病各依前法惟渴去半夏喘嗽去人參腹脹忌甘草婦人帶下舉世皆曰寒誤之甚矣所謂帶下者任脈之病也經曰任脈者起於中極之下以上毛際循腹裡上關元至於咽喉上頤循面入目注言任脈自胞上過帶脈貫絡而上然其病所發正在帶脈之分而淋瀝以下故曰帶下也其赤白說者與痢義同而無獨寒者法曰頭目昏眩口苦舌乾嗌咽不利小便赤澀大便澀滯脈實而數者皆熱證也十二小兒小兒但見上竄及搖頭咬牙即是心熱黃連甘草目連閃肝熱柴胡防風甘草若左腮紅是肝風與錢氏瀉青丸右腮紅肺熱與瀉白散額上紅者是心熱與黃連一味鼻上紅是脾熱與錢氏瀉黃散頦上紅者腎熱知母黃柏皆二制甘草炙凡治小兒病藥味與大人同只劑料等差少如見腮目胞赤呵缺嚏噴驚悸耳尖手足梢冷即是瘡疹三日後其證不減亦不見瘡苗即以柴胡升麻甘草加生薑煎慎不可投以寒涼利臟腑之劑使瘡不能出其禍不可測凡養小兒酒肉油膩生硬冷物及生水等不可食自無疳癖二證驚風搐者與破傷風同十三潮熱潮熱者黃連黃芩生甘草辰戌時發加羌活午間發黃連未間發石膏申時發柴胡酉時升麻夜間當歸根若有寒者加黃耆人參白朮十四咳嗽咳嗽有聲無痰者生薑杏仁升麻五味子防風桔梗甘草無聲有痰者半夏白朮五味子防風枳殼甘草冬月須加麻黃陳皮少許有聲有痰者白朮與半夏五味子防風久不愈者枳殼阿膠痰有五證風氣熱寒溫也詳見活法機要中十五五臟補瀉法肝虛以陳皮生薑之類補之經曰虛則補其母水能生木腎乃肝之母腎水也若補其腎熟地黃黃柏是也如無他證錢氏地黃丸主之實則白芍藥瀉之如無他證錢氏瀉青丸主之實則瀉其子心乃肝之子以甘草瀉心心虛則炒鹽補之虛則補其母木能生火肝乃心之母肝木也心火也以生薑瀉肝如無他證錢氏安神丸是也實則甘草瀉之如無他證以錢氏方中重則瀉心湯輕則導赤散脾虛則甘草大棗之類補之實則以枳殼瀉之如無他證虛則以錢氏益黃散實則瀉黃散心乃脾之母以炒鹽補之肺乃脾之子以桑白皮瀉肺肺虛則五味子補之實則桑白皮瀉之如無他證實則用錢氏瀉白散虛則用阿膠散虛則以甘草補土補其母也實則瀉子澤瀉瀉其腎水腎虛則熟地黃黃柏補之瀉以澤瀉之咸腎本無實本不可瀉錢氏止有補腎地黃丸無瀉腎之藥肺乃腎之母金生水補之故也補則以五味子以上五臟內經藏氣法時論中備言之欲究其詳精看本論
