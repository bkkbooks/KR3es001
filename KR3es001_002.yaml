body:
  text: 卷之中十內經主治備要一五運主病諸風掉眩皆屬肝木諸痛癢瘡瘍皆屬心火諸濕腫滿皆屬脾土諸氣膹郁病痿皆屬肺金諸寒收引皆屬腎水二六氣為病諸暴強直支痛軟戾裡急筋縮皆屬於風諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大而鼓之有聲如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻窒鼽衄血溢血泄淋閟身熱惡寒戰慄驚惑悲笑譫妄衄蔑血汙皆屬於熱諸痙強直積飲痞隔中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴或聾嘔湧溢食不下目昧不明暴注瞤瘈暴病卒死是皆屬於火諸澀枯涸幹勁皴揭皆屬於燥諸病上下所出水液澄澈清冷癥瘕㿗疝痞堅腹滿急痛下痢清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒三五運病解五運主病木火土金水順則皆靜逆則變亂四時失常陰陽偏勝病之源也諸風掉眩皆屬肝木注云掉搖也眩昏亂眩運也風主動故也所謂風氣甚則頭目眩者由風木旺則必是金衰不能制木而木生火木火者皆陽也故風火多兼化也風熱相摶則頭目眩運而轉也火性本動火得風則成焰而旋轉也風勢甚則曲直動搖更加嘔吐也諸痛癢瘡瘍皆屬心火注云痛癢而為瘡火之用也五常之道過極則勝己者反來制之故火熱過極而反兼於水化也所謂鹽能固物而令不腐者鹹寒水化制其火熱使無熱之過極乃水化制之而久固也熱極即是木來生火也甚則皮肉肌膚之間不得宣通故生瘡瘍而痛癢也諸濕腫滿皆屬脾土注云濕地之體也濕極甚則痞塞腫滿物濕亦然故長夏暑濕之甚則庶物隆盛也諸氣膹郁病痿皆屬肺金注云肺主氣氣為陽陽主輕清而升故肺居上部而為病則氣鬱至於痿弱手足無力不能收持乃血液衰少故病然也秋金旺則霧氣蒙郁而草木萎落病之象也諸寒收引皆屬腎水注云收斂引急寒之用也故冬寒則物拘縮也四六氣病解六氣為病風熱濕火燥寒乃天之六氣也風木厥陰肝膽之氣也諸暴強直支痛緛戾裡急筋縮皆屬於風暴強直注云暴卒也虐害也強勁有力而不柔和也直筋勁強也支痛緛戾裡急筋縮注云支痛支持也堅固支持筋攣不柔而痛也緛緛縮也戾乖戾也謂筋縮裡急乖戾失常而病也然燥金主為緊斂短縮勁切而風木為病反見燥金之化者由亢則害承乃制也況風能濕而為燥也筋縮者燥之甚也故謂風甚皆兼於燥也熱者少陰君火之熱乃真心小腸之氣也諸病喘嘔吐酸暴注下迫轉筋小便渾濁腹脹大而鼓之有聲如鼓癰疽瘍疹瘤氣結核吐下霍亂瞀郁腫脹鼻窒鼽衄血溢血泄淋閟身熱惡寒戰慄驚惑悲笑譫妄衄蔑血汙皆屬於熱喘注云喘熱則息數氣粗而為喘也故熱則脈實而甚數喘之象也嘔注云火氣炎上之象也故胃膈熱甚則為嘔也吐酸注云酸者肝木之味也由火實制金不能平木則肝木自甚故為酸也法宜濕藥散之亦猶解表之義也使腸胃結滯開通怫熱散而和之若久喜酸而不已不宜溫之宜以寒藥下之後以涼藥調之結散熱去則氣和也暴注注云卒暴注泄腸胃熱甚則傳化失常火性疾速故如是也下迫注云後重裡急窘迫急痛也火性急速而能燥物故也轉筋注云轉反戾也熱氣燥爍於筋則攣瘈而痛也所謂轉者動也陽動陰靜熱證明矣多因熱甚霍亂吐瀉以致脾胃土衰則肝木自甚而熱燥於筋故轉筋也大法曰渴則為熱凡霍亂轉筋而不渴者未之有也或不因吐瀉而但外冒於風腠理閉密陽氣鬱結怫熱內作熱燥於筋則轉筋也故諸轉筋以湯漬之而使腠理開泄陽氣散而愈也因湯漬之而愈故反疑為寒也小便渾濁注云天氣熱則水渾濁寒則水清潔水體清火體濁故也又如清水為湯則自然濁也腹脹大而鼓之有聲如鼓注云氣為陽陽為熱氣甚則然也癰注云淺而大也經曰熱勝血則為癰膿也疽注云深而惡也瘍注云有頭小瘡也疹注云浮而小癮疹也瘤氣注云赤瘤丹熛熱勝氣也火之色也結核注云火氣熱甚則鬱結堅硬如果中核也不必潰發但以熱氣散則自消也吐下霍亂注云三焦為水穀傳化之路熱氣甚則傳化失常而吐下霍亂火性燥動故也大法曰吐利煩渴為熱不渴為寒或熱吐瀉始得之亦有不渴者若不止則亡液而後必渴也或寒本不渴若不止亡津液過多則亦燥而渴也若寒者脈當沉細而遲熱者脈當實大而數或損氣亡液過極則脈亦不能實數而反緩弱也雖爾亦不為熱矣瞀注云昏也熱氣甚則濁亂昏昧也郁注云怫熱結滯而氣不通暢也所謂熱甚則腠理閉密而鬱結也則如火煉物反相合而不離也故熱鬱則閉塞不通暢也然寒水主於閉藏而今反屬熱者謂火熱亢甚則反兼水化制之故也腫脹注云熱勝於內則氣鬱而為腫也陽熱氣甚則腹脹火主長而高茂形貌彰顯升明舒榮皆腫脹之象也鼻窒注云窒塞也火主䐜膹腫脹故陽明熱而鼻中䐜脹則窒塞也鼽注云鼽者鼻出清涕也夫五常之道微則當其本化甚則兼其鬼賊故經曰亢則害承乃制也由是肝熱甚則出泣心熱甚則出汗脾熱甚則出涎肺熱甚則出涕腎熱甚則出唾此乃寒傷皮毛則腠理閉密陽熱怫鬱而病愈甚也衄注云陽熱怫鬱於足陽明而上熱甚則血妄行為鼻衄也血溢注云血溢者上出也心養於血故熱甚則血有餘而妄行也血泄注云熱在下焦而大小便血也淋注云小便澀痛熱客膀胱鬱結而不能滲泄故也可用開結利小便之寒藥以使結散熱退血氣宣通榮衛和平精神清利而已閟注云大便澀滯也熱耗其液則糞堅結大腸燥澀緊斂故也俗謂風熱結者謂火甚則制金不能平木則肝木自甚故也或大便溏而閟者燥熱在乎腸胃之外而濕熱在內故也身熱惡寒注云此熱在表也邪熱在表而淺邪畏其正故病熱而反惡寒也仲景云無陽不可發汗又云身熱惡寒麻黃湯汗之汗泄熱去身涼即愈戰慄注云戰慄動搖火之象也陽動陰靜而水火相反故厥逆禁固屈伸不便為病寒也慄者寒冷也此由心火熱甚亢極而戰反兼水化制之故寒慄也然寒慄者由火甚似水實非兼有寒氣也故以大承氣湯下之多有燥糞下後熱退戰慄愈矣驚注云心卒動而不寧也火主於動心火熱甚故也雖爾止為熱極於裡乃火極而似水則喜驚也反兼腎之恐者亢則害承乃制故也惑注云疑惑猶豫濁亂而志不一也象火參差而惑亂故火實則水衰失志而惑亂也志者腎水之神也悲注云金肺之志也金本燥能令燥者火也所謂悲泣五液俱出者火熱亢極而反兼水化制之故也笑注云蕃茂鮮淑舒榮彰顯火之化也故喜為心火之志也喜極而笑者猶燔爍火喜而鳴笑之象也譫注云多言也言為心聲猶火燔而鳴故心火熱則多言猶心醉而熱故多言也妄注云虛妄也火為陽故外清明而內濁昧其主動亂故心火熱甚則腎水衰而志不專一虛妄見聞而自為問答則神志失常而如見鬼神也衄蔑血汙注云血出也汙濁也心火熱極則血有餘熱氣上甚則為血溢熱勢亢極則燥而汙濁亢則害承乃制則色兼黑而為紫也濕者太陰濕土乃脾胃之氣也諸痙強直積飲痞隔中滿霍亂吐下體重胕腫肉如泥按之不起皆屬於濕諸痙強直注云筋勁強直而不柔和也土主安靜故也陰痙曰柔痙陽痙曰剛痙亢則害承乃制故濕過極則反兼風化制之然兼化者虛象也實非風也治風則誤積飲注云留飲積蓄而不散也水得燥則消散濕則不消以為積飲土濕主痞故也痞注云與否同不通泰也謂紋理閉密而為痞也隔注云阻滯也謂腸胃隔絕而傳化失常也中滿注云濕為積聚痞隔而土主形體位在中央故中滿也霍亂吐下注云濕為留飲為痞隔而傳化失常故甚則霍亂吐瀉也大法曰若利色青者肝木之色由火甚制金使金不能平木則肝自甚故色青也或言利色青為寒者誤也則如仲景曰少陰病下利清水色純青者熱在裡也大承氣湯下之及小兒熱甚急驚利色多青為熱明矣利色黃者由火甚則水必衰而脾土自旺故色黃也利色紅者為熱心火之色也或赤者熱深也利色黑而反為熱者由火盛過極而反兼水化制之故色黑也則如傷寒陽明熱病則日晡潮熱甚則不識人循衣摸床如見鬼狀獨語法當大承氣湯下之大便不黑者易治黑則難治也諸痢同法然辨痢色以明寒熱者更當審其飲食藥物之色也則如小兒病熱吐利霍亂其乳未及消化而痢尚白者不可便言是寒當以脈證別之又法曰凡泄利小便清白不澀為寒赤澀者為熱也又法曰完穀不化而色不變吐利腥穢澄澈清冷小便不澀身涼不渴脈遲細而微者寒證也穀雖不化其色變非白煩渴小便赤黃而或澀者熱證也凡穀消化者無問他證便為熱也體重注云輕清為天重濁為地故土濕為病則體重痞宜也胕腫肉如泥按之不起注云按之不起泥之象也土過濕則為泥濕為病也積飲痞隔中滿體重霍亂吐下故甚則胕腫也火者少陽相火之熱乃心包絡三焦之氣也諸熱瞀瘈暴喑冒昧躁擾狂越罵詈驚駭胕腫疼酸氣逆衝上禁慄如喪神守嚏嘔瘡瘍喉痹耳鳴或聾嘔湧溢食不下目昧不明暴注瞤瘈暴病卒死是皆屬於火瞀注云昏也則如酒醉而心火熱甚則神濁昧而瞀昏也瘈注云動也惕跳動瘈火之體也暴喑注云卒啞也金肺主聲火旺水衰熱乘金肺而神濁氣鬱則暴喑而無聲也冒昧注云冒昏冒也昧昏暗也氣熱則神濁冒昧火之體也躁擾注云躁動煩熱擾亂而不寧火之體也熱甚於外則肢體躁擾熱甚於內則神志躁動反覆顛倒懊憹煩心不得眠也由水衰而火之動也故心胸躁動謂之怔忪俗云心忪皆為熱也狂越注云狂者無正定也越者乖越理法而失常也夫外清內濁動亂參差火之體也靜順清朗準則信平水之體也由是腎水主智而水火相反故心火旺則腎水衰乃失志而狂越也凡發熱於中則多幹陽明胃經也故經云陽明之厥面赤而熱妄言罵詈注云言為心之聲也罵詈言之惡也今病陽實陰虛則水弱火強制金而不能平木而善言惡發罵詈不避親疏本火熱之所生也驚駭注云驚駭者驚愕也火之用也胕腫注云熱勝肉而陽氣鬱滯故也疼酸注云痠疼也由火實制金不能平木則木旺而為兼化故痠疼也氣逆衝上注云火氣炎上故也禁慄如喪神守注云戰慄禁冷也如喪神守者神能御形而反禁慄則如喪失保守形體之神也嚏注云鼻中因癢氣噴作聲也鼻為肺竅癢為火化心火邪熱干於陽明發於鼻而癢則嚏也瘡瘍注云君火化同也喉痹注云痹不仁也俗作閉猶塞也火主腫脹故熱客於上焦而咽噎腫脹也耳鳴注云有聲非妄聞也耳為腎竅交會手太陽少陰足厥陰少陰少陽之經若水虛火實而熱氣上甚客其經絡衝於耳中則鼓其聽戶隨其脈氣微甚而作音聲也故經曰陽氣為物上甚而躍故耳鳴也然音在耳中故微亦聞之也聾注云聾為腎虛冷俗已誤之矣夫正理曰心火本熱衰則寒矣腎水本寒衰則熱矣腎水既少豈能反為寒邪故經言足少陰腎水虛則腹滿身重濡瀉瘡瘍大便難口苦舌乾咽腫上氣嗌乾及痛煩心心痛黃疸腸澼下血皆熱證也凡治聾者適其所宜若熱證已退其聾不已者當以辛熱發之二三服不愈者不可久服恐熱極而成他病耳若聾有熱證相兼者宜以散風退熱涼藥調之熱退結散而愈也然聾甚閉絕亦為難矣慎不可攻之過極則傷正氣也嘔湧溢食不下注云火氣炎上故也胃膈熱甚則傳化失常故也目昧不明注云目赤腫痛翳膜眥傷皆為熱也經云熱甚目瞑眼黑也仲景言傷寒病熱極則目不識人乃目盲也正理曰由熱甚怫鬱於目而致之然也暴注注云卒瀉與君火義同瞤瘈注云惕跳動也火主動故夏熱則脈洪大而長瞤瘈之象也暴病卒死注云火性速疾故也或心火暴甚而腎水衰弱不能制之熱氣怫鬱心神昏冒則筋骨不用卒倒而無所知是為僵仆也甚則水化制火熱甚而生涎至極即死也俗云暗風由火甚制金不能平木故風木自甚也肥人腠理致密而多鬱滯氣血難以通利若陽熱又甚而鬱結甚則故卒中也瘦人反中風者由暴然陽熱太甚而鬱結不通故也燥者陽明燥金乃肺與大腸之氣也諸澀枯涸幹勁皴揭皆屬於燥澀注云凡物濕潤則滑澤乾燥則澀滯燥濕相反故也如遍身中外澀滯皆屬燥金之化故秋脈澀澀澀也或麻者亦由澀也由水液衰少而燥澀氣行壅滯而不得滑澤通利氣強攻衝而為麻也俗方多用烏附輩者令氣因之沖開道路以得通利氣行故麻愈也無熱證即當此法治之甚佳或風熱勝濕為燥因而病麻則宜以退風散熱活血養液潤燥通氣之涼藥調之則麻自愈也治諸燥澀只如此法是也枯涸乾勁注云枯不榮旺也涸無水液也干不滋潤也勁不柔和也然春秋相反燥濕不同故也大法曰身表熱為熱在表渴飲水為熱在裡身熱飲水表裡俱有熱身涼不渴表裡俱無熱經所不取火化渴者謂渴非特為熱如病寒吐利亡液過極則亦燥而渴也雖病風熱而液尚未衰則亦不渴也豈可止言渴為熱而痞為寒也皴揭注云皮膚啟裂也乾為天為燥金坤為地為濕土天地相反燥濕異用故燥金主於緊斂故秋脈緊細而微而濕土主於縱緩故六月其脈緩大而長也如地濕則縱緩滑澤干則緊斂燥澀皴揭之理明矣俗言皴揭為風者由風能勝濕而為燥故也經云厥陰所至為風府為璺啟由風勝濕而為燥也寒者太陽寒水乃腎與膀胱之氣也諸病上下所出水液澄澈清冷癥瘕㿗疝痞堅腹滿急痛下利清白食已不飢吐利腥穢屈伸不便厥逆禁固皆屬於寒諸病上下所出水液澄澈清冷注云澄湛而不渾濁也水體清淨而其氣寒冷故水穀不化而吐利清冷水液為病寒也如天氣寒則濁水自然澄清也癥猶徵也注云腹中堅硬按之應手謂之癥也水體柔順而今反堅硬如地體者亢則害承乃制也故病濕過極而為痓反兼風化制之也風病過極而反燥筋脈勁急反兼金化制之也燥病過極而煩渴反兼火化制之也熱病過極而反出五液或為戰慄惡寒反兼水化制之也其為治者俾以瀉其過極之氣以為病本不可反誤治其兼化也夫五常之道甚而無以制之則造化息矣如春木旺而多風風大則反涼是反兼金化制其木也大涼之下天氣反溫乃火化承其金也夏火熱極體反出液是反兼水化制其火也因而濕蒸雲雨乃土化承於水也雨濕過極而兼烈風乃木化制其土也飄驟之下秋氣反涼乃金化承於木也涼極而反燥乃火化制其金也因而以為冬寒乃水化承於火也寒極則水凝如地乃土化制其水也凝凍極而起東風乃木化承土而成歲也凡不明病之標本者由未知此變化之道也瘕注云腹中雖硬而忽聚忽散無有常准經曰血不流而寒薄故血內凝不流而成瘕也一云腹內積病也又曰小腸移熱於大腸為伏瘕為沉注曰小腸熱以傳入大腸兩熱相搏則血溢而為虙瘕也血澀不利則月事沉滯而不行故云為虙假為沉虙乃或陽氣鬱結怫熱壅滯而堅硬不消者非寒瘕也宜以脈證別之瘕一為疝傳寫之誤㿗疝注云小腹連卵腫急絞痛也寒主拘縮故也寒極而土化制之故腫滿也經云丈夫㿗疝謂陰器連小腹急痛也經注曰寒氣聚而為疝也脈急者寒之象也然寒則脈當短小而遲今言急者非急數而洪也由緊脈主痛急為病甚也病寒縮急亦短小也所以有痛而脈緊急者脈為心所養也凡氣為痛則心神不寧而緊急不得舒緩故脈亦從之而見也欲知何氣為其痛者診其緊急相兼之脈可知矣如緊急洪數則為熱痛之類也堅痞腹滿急痛注云寒主拘縮故急痛也寒極則血脈凝冱而反兼土化制之故堅痞而腹痛也或熱鬱於內而腹滿堅結痛者不可言為寒也當以脈別之下利清白注云寒則清淨明白故也食已不飢注云胃熱則消穀善飢故病寒則食雖已而不飢也胃膈潤澤而無燥熱故也或邪熱不殺穀而腹熱脹滿雖數日而不食亦不飢者不可言為寒也由陽熱太甚而鬱結傳化失常故雖不食亦不飢也二證以脈別之自見吐利腥穢注云腸胃寒而傳化失常我子能制鬼賊則己當自實故寒勝火衰金旺而吐利腥穢也腥者金之臭也由是熱則吐利酸臭而寒則吐利腥穢也亦猶飯漿熱則喜酸寒則水腥也屈伸不便厥逆禁固注云陰水主於清淨故病寒則四肢逆冷而禁止堅固舒捲不便利也故冬脈沉而短以敦病之象也或病寒尚微而未至於厥逆者不可反以為熱或熱甚而成陽厥者不可反以為病寒也然陰厥者之病脈候皆為陰證身涼不渴脈遲細而微未嘗見於陽證也其陽厥者之病脈證皆為陽證熱極而反厥時復反溫雖厥而煩渴譫妄身熱而脈數也若陽厥極深而至身冷反見陰脈而欲絕者止為熱極而欲死也經曰一陰一陽之謂道偏陰偏陽之謂疾陰陽以平為和以偏為病萬物皆負陰抱陽而生故孤陰不長獨陽不成是以陽氣極甚而陰氣極衰則陽氣怫鬱陰陽偏傾而不能宣行則陽氣蓄聚於內而不能營運於四肢則手足厥冷為陽厥仲景曰熱深則厥亦深熱微則厥亦微又曰厥當下之下後厥愈當以涼藥養陰退陽涼膈散調胃承氣湯下之是也大凡治病者必先明其標本標者末本者根源也故經曰先病為本後病為標又曰標本相傳先以治其急者又言六氣為本三陰三陽為標故病氣為本受病經絡臟腑謂之標夫標本微甚治以逆從不可不通也故經曰知逆與從正行無問明知標本萬舉萬當不知標本是謂妄行正此謂也十一六氣方治一風防風通聖散治一切風熱鬱結氣血蘊滯筋脈拘攣手足麻痹肢體焦痿頭痛昏眩腰脊強痛耳鳴鼻塞口苦舌乾咽嗌不利胸膈痞悶咳嘔喘滿涕唾稠黏腸胃燥熱結便溺淋閉或腸胃蘊熱鬱結水液不能浸潤於周身而為小便多出者或濕熱內甚而時有汗泄者或表之正氣與邪熱並甚於里陽極似陰而寒戰煩渴者或熱甚變為瘧疾久不已者或風熱走注疼痛麻痹者或腎水陰虛心火陽熱暴甚而中風或暴喑不語及暗風癇者或破傷中風時發潮熱搐搦並小兒熱甚驚風或斑疹反出不快者或熱極黑陷將欲死者或風熱瘡疥久不愈者並解耽酒熱毒及調理傷寒發汗不解頭項肢體疼痛並宜服之防風二錢半川芎五錢石膏一錢滑石二錢當歸一兩赤芍五錢甘草二錢半炙大黃五錢荊芥穗二錢半薄荷葉二兩麻黃五錢去根苗節白朮五錢山梔子二錢連翹五錢黃芩五錢桔梗五錢牛蒡酒浸五錢人參五錢半夏薑製五錢以上共五錢上為粗末每服四錢水一盞生薑三片煎至六分去滓溫服不計時候日三服病甚者五七錢至一兩極甚者可下之多服二兩三兩得利後卻當服三五錢以意加減病愈更宜常服則無所損不能再作靈砂丹治風熱鬱結血氣蘊滯頭目昏眩鼻塞清涕口苦舌乾咽嗌不利胸膈痞悶咳嗽痰實腸胃燥澀小便赤或腎水陰虛心火熾甚及偏正頭風痛發落齒痛遍身麻木疥癬瘡瘍一切風熱並皆治之獨活羌活細辛石膏防風連翹薄荷各三兩川芎山梔荊芥芍藥當歸黃芩大黃生桔梗以上各一兩全蠍微炒半兩滑石四兩菊花人參白朮各半兩寒水石一兩生用砂仁一錢甘草三兩生硃砂一兩為衣上為細末煉蜜為丸每兩作十丸硃砂為衣每服茶清嚼一丸食後服神仙換骨丹治氣血凝滯榮衛鬱結風熱濕氣相搏筋骨之間內舍偏虛發為不遂之病氣感八風血凝五痹筋攣骨痛癱瘓偏枯一切風證並宜治之服之神妙難以言宣槐角炒黃熟桑白皮去皮川芎蒼朮泔浸去皮白芷蔓荊子去萼人參威靈仙何首烏防風各二兩苦參五味子香附各一兩麝半兩別研麻黃十斤硃砂水飛一兩上將麻黃去根苗節用河水三石三斗三升小鬥七升是也熬至六升濾去麻黃澄清再熬至二升半入其餘藥末每一兩三錢作十丸硃砂為衣每一丸酒一盞浸至晚溶化臨臥服不換金丹退風散熱治風有二法行經和血及開發腠理經脈凝滯非行經則血不順是治於內也皮膚鬱結非開發則榮衛不和是調理於外也此亦發散之藥也荊芥穗白殭蠶炒天麻甘草各一兩羌活去蘆川芎白附子生川烏頭生蠍梢去毒炒藿香葉各半兩薄荷三兩防風一兩上為細末煉蜜丸彈子大每服細嚼茶清下如口喎向左即右腮上塗之即止花蛇續命湯治卒中風牙關緊急精神昏憒口眼喎斜不知人事痰涎不利喉中作聲白花蛇酒浸去皮骨焙乾全蠍炒獨活去土天麻附子人參防風肉桂白朮藁本白附子炮赤箭川芎細辛去葉甘草炙白殭蠶去絲灰炒半夏湯浸切白茯苓去皮麻黃去節水煮三沸去沫細切以上各一兩上為粗末每服五錢水一盞生薑五片煎至七分去滓稍熱服不拘時加減沖和湯治中府之病宣外陽補脾胃瀉風木實表裡養榮衛柴胡五分升麻三分黃耆五分半夏二分黃芩陳皮人參芍藥甘草各二分半當歸黃柏酒浸各三分上銼如麻豆大作一服水二盞煎至一盞去滓稍熱服如有自汗多者加黃耆半錢嗽者加五味子二十粒防風天麻散治風痹走注肢節疼痛中風偏枯或暴喑不語內外風熱壅滯解昏眩防風川芎天麻羌活白芷當歸草烏頭白附子荊芥穗甘草炙各半兩滑石二兩上為末熱酒化蜜少許調半錢加至一錢覺藥力運行微麻為度或煉蜜丸如彈子大每服一丸熱酒化下或半丸細嚼白湯下亦得散鬱結宣氣血如甚者服防風通聖散祛風丸治風偏手足顫掉語言謇澀筋骨痛烏頭炮天南星草烏頭炮半夏綠豆粉各一兩甘草川芎白殭蠶藿香零零香地龍蠍梢各三兩川薑半兩炮上末一兩用綠豆粉一兩白麵二兩滴水丸梧桐子大每三五丸細嚼茶清下或五七丸亦得食後服初服三丸漸加多大通聖白花蛇散中府之藥也大治諸風無問新久手足軃曳腰腳緩弱行步不正精神昏昧口眼喎斜語言謇澀痰涎壅盛筋脈攣急肌肉頑痹皮膚燥癢骨節疼目眩下注腰腳疼痛腿重腫瘍生瘡或痛無常處遊走不定及風氣上攻面浮腫耳鳴並宜服之天麻去苗赤箭防風去苗藁本木香海桐皮肉桂杜仲炒乾山藥當歸威靈仙白附子炮菊花蔓荊子羌活去蘆虎骨酥炙白芷乾蠍白花蛇酒浸去皮骨肉用蓽薢甘草炙牛膝去苗郁李仁去皮研厚朴薑製各一兩上為末每服一錢至二錢溫酒調下荊芥湯調下亦得空心服之常服祛風逐氣通行榮衛久病風人尤宜常服輕者中風不過二十服平安如故活命金丹治風中臟不語半身不遂肢節頑痹痰涎上潮咽嗌不利飲食不下牙關緊禁及解一切藥毒發熱腹脹大小便不利胸膈痞滿上實下虛氣閉面赤汗後餘熱不退勞病諸證無問老幼婦人俱得服之川芎甘草板藍根葛根各一兩龍腦二錢研麝香二錢研牛黃研五分生犀桂各三錢珠子粉半兩川大黃二兩半甜硝一兩辰砂四錢一半為衣青黛三錢薄荷五錢上為細末煉蜜同水浸蒸餅糊為劑每一兩作十丸別入硃砂為衣就濕以真金箔四十葉為衣葛月修合瓷器內收貯多年不壞如風毒茶清送下解毒藥新冷水化下餘熱勞病及小兒驚熱薄荷湯化下以上煎量大小加減用之至寶丹治卒中風急不語中惡氣絕中諸物毒暗風中熱疫毒陰陽二毒山嵐瘴氣毒中暑毒產後血暈口鼻血出惡血上攻心煩躁心肺積熱霍亂吐利風注筋惕大腸風秘神魂恍惚頭目昏眩眠臥不安唇口乾焦傷寒狂語小兒急驚風熱卒中客忤不得眠睡驚風搐搦以上無不治者辰砂五兩水飛生犀五兩麝香二兩半玳瑁五兩牛黃二兩龍腦五兩水飛人參五兩銀箔一百二十片一半為衣余入藥琥珀五兩安息香五兩用酒半升熬膏金箔二百二十片一半為衣余入藥雄黃一兩半南星三兩水煮軟切片一法酒二升半浸蒸七次焙乾用上為細末半用安息香膏次煉蜜一處搜和為丸梧桐子大每服三丸至五丸煎人參湯下之小兒一丸至二丸湯下之同上牛黃通膈湯治初病風證覺一二日實則急下之牛黃二錢別研大黃一兩甘草一兩炙朴硝三錢別研上件為末每服一兩水二鍾除牛黃朴硝外煎至一盞去滓入牛黃朴硝一半調服以利三二行為度未利再量虛實加減服之二暑熱白虎湯傷寒大汗出後表證已解心胸大煩渴欲飲水及吐或下後七八日邪毒不解熱結在裡表裡俱熱時時惡風大渴舌上乾燥而煩欲飲水數升者宜服之又治夏月中暑毒汗出惡寒身熱而渴知母去皮一兩半甘草一兩炙粳米一合石膏亂文者別研四兩上為末每服三錢水一盞半煎至一盞去滓溫服小兒量力與之或加人參少許同煎亦得食後服此藥立夏後立秋前可服春時及秋後並亡血虛人不宜服桂苓甘露飲治飲水不消嘔吐瀉利流濕潤燥宣通氣液水腫腹脹泄瀉不能止者兼治霍亂吐瀉下利赤白煩渴解暑毒大有神效兼利小水白茯苓去皮白朮豬苓甘草炙澤瀉以上各一兩寒水石一兩別研桂去粗皮半兩滑石二兩別研上為末或煎或水調二三錢任意或入蜜少許亦得桂苓白朮散治冒暑飲食所傷轉甚濕熱內甚霍亂吐瀉轉筋急痛腹滿痞悶小兒吐瀉驚風宜服之木香桂枝藿香人參茯苓去皮各半兩甘草炙白朮葛根澤瀉寒水石各一兩滑石石膏上為末每服三錢白湯調下新水或生薑湯亦得益元散桂府滑石二兩燒紅甘草一兩上為極細末每服三錢蜜少許溫水調下無蜜亦得或飲冷者新水亦得或發汗煎蔥白豆豉湯調無時服竹葉石膏湯治傷寒解後虛羸少氣氣逆欲吐淡竹葉六錢半銼石膏四兩別研人參甘草炙各半兩麥門冬一兩半半夏二錢半湯洗上銼如麻豆大每服五錢水一盞半入粳米百餘粒煮取八分米熟去滓溫服化痰玉壺丸南星半夏生天麻各一兩白麵三兩上為細末滴水丸梧子大每服二十丸用水一大盞先煎令沸下藥煮候浮漉出方熟放溫別用生薑湯下不拘時候四君子湯治煩熱燥渴白茯苓去皮人參去蘆甘草炙白朮各等分上㕮咀每服三錢水一盞煎至七分去滓溫服白朮散治諸煩熱渴津液內耗不問陰陽服之止渴生津液白朮人參白茯苓去皮甘草炙藿香木香各一兩乾葛二兩上為粗末每服三錢水一盞煎至七分去滓溫服不拘時小柴胡湯治傷寒溫病惡風頸項強急胸膈肋痛嘔噦煩渴寒熱往來身面皆黃小便不利大便秘硬或過經未解潮熱不除及瘥後勞復發熱頭痛婦人傷風頭痛煩熱經血適斷寒熱如瘧發作有時及產後傷風頭痛煩熱並宜服之柴胡四兩去苗黃芩人參半夏湯洗七次甘草各一兩半上為粗末每服二錢水一盞半生薑五片棗子一枚擘破同煎至七分去渣熱服不拘時小兒分作二服更量加減升麻葛根湯治大人小兒時氣瘟疫頭痛發熱肢體煩熱瘡疹未發並宜服之升麻葛根甘草炙芍藥各半兩上為末每服三錢水一盞半煎至一盞去渣稍熱服不拘時日進二三服病去身涼為度小兒量力與服三濕土葶藶木香散治濕熱內外甚水腫腹脹小便赤澀大便滑瀉葶藶茯苓去皮白朮豬苓去皮各一兩木香半錢澤瀉木通甘草各半兩桂一錢滑石三兩上為細末每服三錢白湯調下食前服此藥下水濕消腫脹止瀉利利小便若小便不得通利而反轉泄者此乃濕熱癃閟極深而攻之不開故反為注瀉此正氣已衰多難救也慎不可攻之而無益耳白朮木香散治喘嗽腫滿欲變成水病者不能臥不欲飲食小便閉者白朮豬苓去皮澤瀉赤茯苓以上各半兩木香陳皮各二兩去白檳榔官桂各二錢滑石三兩上為粗末每服五錢水一盞生薑三片煎至七分去渣食前溫服大橘皮湯治濕熱內甚心腹脹滿水腫小便不利大便滑泄橘皮一錢半木香一錢滑石六錢檳榔三錢茯苓一兩去皮豬苓去皮澤瀉白朮官桂各五錢甘草三錢上為末每服五錢水一盞生姜五片煎至七分去渣溫服桂苓白朮丸消痰逆止咳嗽散痞滿壅塞開堅結痛悶推進飲食調和臟腑無問寒濕濕熱嘔吐瀉利皆能開發以令遍身流濕潤燥氣液宣平而愈並解酒毒兼療肺痿癆嗽水腫腹脹瀉利不能止者服之利止為度後隨證治之楝桂乾生薑各一分茯苓去皮半夏各一兩白朮紅皮去穰澤瀉各半兩上為末麵糊為丸如小豆大每服二三十丸生薑湯下日進三服病在膈上食後服膈下食前服在中者不拘時或一法加黃連半兩黃柏二兩水丸取效甚妙六一散治身熱嘔吐泄瀉腸癖下利赤白治癃閉淋痛利小便偏蕩胃中積聚寒熱宣積氣通九竅六腑生津液去留結消蓄水止渴寬中除煩熱心躁治腹脹痛補益五臟大養脾胃腎之氣理內傷陰痿安魂定魄補五勞七傷一切虛損主癇痓驚悸健忘心煩滿短氣臟傷咳嗽飲食不下肌肉疼痛治口瘡牙齒疳蝕明耳目壯筋骨通經脈和血氣消水穀保真元解百藥酒食邪毒耐勞役飢渴宣熱闢中外諸邪所傷久服強志輕身駐顏延壽及解中暑傷寒疫癘飢飽勞損憂愁思慮恚怒驚恐傳染並汗後遺熱勞復諸病並解兩感傷寒能令遍身結滯宣通氣和而愈及婦人下乳催生併產後損液血衰陰虛熱甚一切熱病並宜服之兼防發吹奶乳癰或已覺吹乳乳結頓服即愈乃神驗之仙藥也惟孕婦不可服滑石六兩燒紅甘草一兩微炒上為細末每服三錢蜜少許溫水調下無蜜亦得日三四服或水調下亦得解利發汗煎蔥白豆豉湯下四錢並三四服以效為度此藥寒涼解散鬱熱若病甚不可解多服無害但有益耳五苓散治傷寒溫熱病在表裡未解頭痛發熱口燥咽乾煩渴飲水或水入即吐小便不利及汗出表解煩渴不止者宜服之及治霍亂吐利煩渴飲水澤瀉二兩半豬苓赤茯苓去皮白朮官桂去皮各一兩上為粗末每服三錢熱湯下惡熱欲飲冷者新水調下或生薑湯下愈妙或加滑石二兩甚佳或喘嗽咳煩心不得眠者加阿膠半兩及治瘀熱在裡身發黃疸濃煎茵陳蒿湯調下食前服疸病發渴及中水引飲亦可服新汲水調下小兒加白朮末少許如虛熱加黃耆人參末少許赤茯苓丸治脾胃水濕太過四肢腫滿腹脹喘逆氣不宣通小便赤澀葶藶四兩炒防己二兩赤茯苓一兩木香半兩上為細末棗肉丸梧桐子大每服三十丸桑白皮湯食前下人參葶藶丸治一切水腫喘滿不可當者人參一兩去蘆苦葶藶炒四兩上為細末棗肉丸梧子大每三十丸煎桑白皮湯下海藻散治男子遍身虛腫喘滿悶不快者海藻銼碎川大黃大戟並銼續隨子去殼以上各二兩上件好酒二鍾淨碗內浸一宿取去曬乾候用甘遂麵炒黃色一兩白牽牛生一兩滑石半兩肉豆寇青皮去穰橘皮去白以上各一兩上為細末每服二錢如氣實者三錢半平明冷茶清調下至辰時取下水二三行腫減五七分隔二三日平明又一服腫消魚肉鹽皆忌一曰小兒腫一錢五歲以下者半錢孕婦勿服四火涼膈散治傷寒表不能解半入於里下證未全下後燥熱怫結於內心煩懊憹不得眠臟腑積熱煩渴頭昏唇乾咽燥喉痹目赤頰硬口舌生瘡咳唾稠黏譫語狂妄腸胃燥澀便溺閉結風熱壅滯瘡癬發斑驚風熱極豆黑陷欲死者連翹一兩山梔大黃薄荷黃芩以上各半兩甘草一兩半朴硝一錢加減法咽喉痛涎嗽加荊芥半兩桔梗一兩咳而嘔者加半夏半兩每服生薑三片同煎血衄嘔血加當歸芍藥各半兩生地黃一兩淋者加滑石四兩茯苓一兩風眩目痛加川芎半兩石膏三兩防風半兩斑疹加葛根一兩荊芥半兩赤芍川芎防風桔梗各半兩上為末每服二錢至五錢水一盞蜜少許同煎至七分去渣溫服虛實加減如前或小兒可服七分八分或無熱甚黑陷腹脹喘急小便赤澀而將死者此一服更加大承氣湯約下之得和者即瘥黃連解毒湯治傷寒雜病燥熱毒煩悶乾嘔口燥呻吟喘滿陽厥極深蓄熱內甚俗妄傳為陰毒者及汗吐下後寒涼諸藥不能退熱勢並兩感證同法黃連黃柏黃芩大梔子各半兩上銼如麻豆大每服半兩水一盞煎至四分去渣溫服或腹滿嘔吐或欲作利者每服加半夏三個厚朴二錢茯苓四錢去皮水一盞半姜三片煎半盞去滓溫服名曰黃連半夏解毒湯三一承氣湯治傷寒雜證內外所傷日數遠近腹滿咽乾煩渴譫妄心下按之硬痛小便赤澀大便結滯或濕熱內甚而為滑泄熱甚喘咳悶亂驚悸狂顛目病口瘡舌腫喉痹癰瘍陽明胃熱發斑脈沉而可下者小兒熱極風驚潮搐昏塞並斑疹黑陷不起小便不通腹滿欲死或斑疹後熱不退久不作痂或作斑癰瘡癬久不已者怫熱內盛痃癖堅積黃瘦瘧疾久新暴卒心痛風痰酒隔腸垢積滯久壅風熱暴傷酒食煩心悶亂脈數沉實或腎水陰虛陽熱暴甚而僵仆卒中一切暴喑不語蓄熱內傷陽厥極深脈反沉細欲絕或表之沖和正氣與邪氣並之於裡則裡熱亢極似陰反為寒戰脈微而絕或風熱燥甚客於下焦而大小便澀滯不通者或產婦死胎不下或兩感表裡熱甚須可下者大黃芒硝枳殼厚朴各半兩甘草一兩上銼如麻豆大水一盞半姜三片煎至六分下硝一二沸去渣熱服以利為度熱甚者作一服得利為效臨時消息八正散治大人小兒心經邪熱一切蘊毒咽乾口燥大渴引飲心忪面熱煩躁不寧目赤睛痛唇焦鼻衄口舌生瘡咽喉腫痛又治小便赤澀或癃閉不通及熱淋血淋並宜服之大黃麵裹煨乾用瞿麥木通萹蓄車前子山梔甘草炙滑石以上各一兩上為散每服二錢水一盞入燈心些子煎至七分去滓溫服食後臨臥小兒量力與之洗心散治風壅壯熱頭目昏痛肩背拘急肢節煩疼熱氣上衝口苦唇焦咽喉腫痛痰涎壅滯涕唾稠黏心神煩躁眼澀睛疼及寒熱不調鼻塞聲重咽乾多渴五心煩熱小便赤澀大便閉硬宜服大黃麵裹煨淨用甘草炙當歸去苗洗芍藥麻黃去根荊芥穗各半兩白朮三錢半上為細末每服二錢水一盞生薑薄荷各少許同煎至七分內硝更上火煎一二沸去滓溫服如小兒麩豆瘡疹欲發先狂語多渴及驚風積熱可服一錢並臨臥服如大人五臟壅實欲要溏轉加至四五錢乘熱服之調胃承氣湯治胃中熱實而下滿一切胃經實熱者皆可服之大黃炙半兩芒硝半兩大黃半兩內經曰熱淫於內治以鹹寒佐以苦甘芒硝鹹寒以除熱大黃苦寒以蕩實甘草甘平以助二物推陳致新法也上件銼如麻豆大水一盞煮二味至七分去滓納硝更上火煎一二沸服之大承氣湯治痞滿燥實地道不通大黃苦寒一兩厚朴苦寒薑製二兩芒硝鹹寒一合枳殼五個去穰麩炒內經曰燥淫於內所勝以苦下之大黃枳實之苦以除燥熱又曰燥淫於內治以苦溫厚朴之苦下燥結又曰熱淫所勝治以鹹寒芒硝之咸以攻鬱熱蘊結上四味以水五升先煮二味取三升去滓納大黃取二升去滓入芒硝更上火微煎一二沸分二服得下勿服余者方內去硝即小承氣湯也治證同柴胡飲子解一切肌熱蒸熱積熱及寒熱往來蓄熱或寒戰及傷寒發汗不解或不經發汗傳受表裡俱熱口乾煩渴或表熱入里下證未全下後熱未除及汗後餘熱勞復或婦人經病不快產後但有如此之證並宜服之乃氣分熱也柴胡人參黃芩甘草炙大黃當歸芍藥各半兩上為粗末每服四錢水一盞姜三片煎至六分去滓溫服小兒分三服不拘時日三服除病為度熱甚者加服白虎湯方見前暑熱內此方加甘草半兩桃仁承氣湯治熱結膀胱其人如狂熱在下焦與血相搏血下則熱隨出而愈芒硝甘草桂枝各六錢桃仁五十個去皮尖大黃一兩三錢甘以緩之辛以散之小腹急結緩以桃仁之甘下焦蓄血散以桂枝之辛大熱之氣寒以取之熱甚搏血加二物於調胃承氣湯中也上五味㕮咀以水二升三合煮取一升二合去滓納芒硝煎一二沸分五服神芎丸治一切熱證常服保養除痰消酒食清頭目利咽膈能令遍身結滯宣通氣利而愈神強體健耐傷省病並婦人經病產後血滯腰腳重痛小兒積熱驚風潮搐藏用丸亦曰顯仁丸加黃連薄荷川芎各半兩名曰神芎丸大黃黃芩各二兩牽牛滑石各四兩上為末滴水丸如小豆大或煉蜜丸亦妙每十五丸加至五七十丸溫水下冷水亦得五燥脾約丸約者結約之象又曰約束之約也內經曰飲入於胃遊溢精氣上輸於脾脾氣散精上歸於肺通調水道下輸膀胱水精四布五經並行為其津液者脾氣結約束精液不得四布五經但輸膀胱致小便數大便硬故曰其脾為約麻仁味甘平杏仁甘溫內經曰脾欲緩急食甘以緩之麻仁杏仁潤物也本草曰潤可以去枯腸燥必以甘潤之物為主是以麻仁為君杏仁為臣枳殼味苦寒厚朴味苦溫潤燥者必以甘甘以潤之破結者必以苦苦以泄之枳殼厚朴為佐以散脾之約芍藥味酸微寒大黃味苦湧泄為陰芍藥大黃為使以下脾之結燥潤結化津液還入胃中則大便利小便數愈麻仁一兩白芍藥枳殼厚朴各半兩大黃二兩杏仁湯浸去皮尖研三錢上為極細末蜜丸梧子大米飲下三十丸日進三服漸加以利為度潤腸丸治脾胃中伏火大便秘澀或乾燥不通全不思食此乃風結秘血結秘皆令閟塞也風以潤之血以和之和血疏風自通利矣麻仁桃仁去皮尖羌活當歸大黃各半兩上除麻仁桃仁別研如泥余藥細研煉蜜丸梧子大每服五十丸至百丸空心白湯下如血澀而大便燥者加桃仁酒洗大黃如大便不通而澀滋其榮甚者急加酒洗大黃如風結燥大便不行加麻仁大黃如風濕大便不行者加皂角仁大黃秦艽以利之如脈澀覺身有氣澀而大便不通者加郁李仁大黃以除氣澀當歸潤燥湯升麻一兩當歸一兩生地黃二兩甘草一錢炙乾地黃一錢桃仁一錢研麻仁一錢紅花半錢大黃一錢煨上桃仁麻仁別研如泥余銼麻豆大作一服水二鍾入桃麻仁煎至一盞去渣空心宿食消盡稍熱服橘杏丸治氣閉老人虛弱人皆可服橘皮杏仁湯浸去皮尖上二味等分煉蜜丸梧子大每服七十丸空心米飲下七宣丸療風氣治結聚宿食不消兼砂石皮毛在腹中及積年腰腳疼痛冷如冰石腳氣衝心煩憒頭眩暗倒肩背重心腹脹滿胸膈痞塞風毒腫氣連及頭面大便或秘小便時澀脾胃虛痞不能飲食腳轉筋攣急掣痛心神恍惚眠臥不安等疾柴胡去苗五兩桃仁去皮六兩枳實麩炒五兩訶子皮五兩木香五兩大黃麵煨十五兩甘草炙四兩上為細末煉蜜丸梧子大每服二十丸食前臨臥服米飲下一服加至四五十丸宣利為度覺病勢退服五補丸不問男女老幼並可服之量與加減麻仁丸調三焦和五臟潤腸胃除風氣及治風熱壅結津液耗少令大便閉澀不通高年及有風人大便秘宜服之枳實麵炒白檳榔各一兩半羌活一兩洗菟絲子一兩半酒浸別末山茱萸一兩半郁李仁四兩去皮車前子一兩半肉桂一兩木香一兩大黃四兩半麻仁四兩別研上為細末煉蜜丸如梧子大每服十五丸至二十丸臨臥溫水下神功丸治三焦氣壅心腹痞悶六腑風熱大便不通腰腳疼痛肩背重疼頭昏面熱口苦咽乾心胸煩躁眠臥不安及治腳氣並素有風人大便結燥大黃四兩面煨麻仁二兩別研人參二兩訶子皮四兩上一處研煉蜜丸如梧子大每服三十丸溫水下酒亦得食後服如大便不通倍服利為度厚朴湯凡治臟腑之秘不可一例治療有虛秘有實秘有胃實而秘者能飲食小便赤當以麻仁丸七宣丸之類主之胃虛而秘者不能飲食小便清利厚朴湯宜之厚朴三兩銼白朮五兩半夏二兩泡枳殼二兩炒陳皮三兩上為細末每服三錢水盞半姜三片棗三個煎至一盞去滓溫服空心食前胃實秘物也胃虛秘氣也七聖丸治風氣壅盛痰熱結搏頭目昏重涕唾稠黏心煩面熱咽乾口燥精神不爽夜臥不安肩背拘急胸膈痞悶腹脹脅滿腰腿重痛大便秘澀小便赤澀宜服之川芎肉桂木香大黃各半兩酒浸羌活一兩郁李仁一兩去皮檳榔半兩上七味為末煉蜜丸梧子大每服十五丸至二十丸溫水下食後臨臥服山嵐瘴地最宜服之更量臟腑虛實加減犀角丸治三焦邪熱一切風氣又治風盛痰實頭目昏重肢體拘急痰涎壅塞腸胃燥結大小便難黃連犀角各一兩人參二兩大黃八兩黑牽牛二十兩上與黑牽牛和合為細末煉蜜丸如梧子大每服十五丸至二十丸臥時溫水下更量虛實加減六寒水大己寒丸治大寒積冷臟腑虛寒心腹疼痛胸脅脹滿泄瀉腸鳴下利自汗米穀不化陽氣暴衰陰氣獨盛手足厥冷傷寒陰勝神昏脈短四肢怠惰並宜服之乾薑良薑各六兩桂蓽茇各四兩上為末水糊丸梧子大每二十丸米飲湯下食前服四逆湯治陰證傷寒自利不渴嘔噦不止或吐利俱作小便澀或利脈微欲絕腹痛脹滿手足厥冷或病內寒外熱下利清穀四肢沉重或汗出不止並宜服之此藥助陽救衰甘草炙六錢乾薑半兩熟附子一枚去皮上㕮咀每服四錢水一盞半煎至七分溫服不拘時附子理中丸治脾胃冷弱心腹絞痛嘔吐瀉利轉筋霍亂體冷微汗手足厥冷心下逆滿腹中雷鳴嘔吐不止飲食不進及一切沉寒痼冷並宜服之人參白朮乾薑炮甘草附子各二兩炮去皮臍上五味為末煉蜜丸每兩作十丸每服一丸水一盞拍破煎至七分稍熱空心食前服之胡椒理中丸治脾胃虛寒氣不通宣咳嗽喘急逆氣虛痞胸膈噎悶腹脹滿痛迫塞短氣不能飲食嘔吐痰水不止胡椒蓽茇乾薑炮款冬花甘草陳皮良薑細辛去苗各四兩白朮五兩上為細末煉蜜丸梧子大每服五丸至七丸溫酒下不拘時日進三服理中丸治中焦不和脾胃宿冷心下虛痞腹疼痛胸脅逆冷飲食不下噫氣吞酸口苦失味怠惰嗜臥不思飲食及腸鳴自利米穀不化白朮乾薑炮人參去蘆甘草炙各等分上為末煉蜜丸梧子大每服三十丸至五十丸空心沸湯下為粗末理中湯也味數相同鐵刷湯治積寒痰飲嘔吐不止胸膈不快飲食不下並宜服之半夏草豆蔻丁香乾薑炮訶子皮各三錢生薑一兩上㕮咀水五盞煎至二盞半去渣分三服相繼不拘時大吐不止加附子三錢生薑半兩桂附丸治風邪冷氣入乘心絡或臟腑暴感風寒上乘於心令人卒然心痛或引背膂甚則經久不瘥川烏頭三兩炮去皮臍附子三兩乾薑二兩炮赤石脂二兩桂二兩蜀椒去目微炒上六味為末蜜丸如梧子大每服三十丸溫水下覺至痛處即止若不止加至五十丸以知為度若早服無所覺至午後再服二十丸若久心痛每服三十丸至五十丸盡一劑終身不發姜附湯治五臟中寒或卒然暈悶手足厥冷乾薑附子炮去皮臍甘草炙各半兩上㕮咀每服四錢水盞半姜五片煎至七分去渣食前服挾風不仁加防風半兩兼濕腫滿加白朮半兩筋脈攣急加木瓜半兩肢節疼加桂心半兩加減白通湯治形寒飲冷大便自利完穀不化腹臍冷痛足脛寒逆內經云寒淫於內治以辛熱濕淫於內治以苦熱以苦發之以附子大辛熱助陽退陰溫經散寒故以為君乾薑官桂辛甘大熱亦除寒濕白朮半夏苦辛溫胃燥脾濕故為臣草豆蔻炙甘草人參甘辛大溫溫中益氣生薑辛大溫能除濕之邪蔥白辛溫以通上焦陽氣故以為佐又云補下治下制以急急則氣味厚故大作湯劑投之不數服而止痛減足脛漸溫調飲食數次平復附子一兩去皮臍乾薑一兩炮官桂五錢白朮五錢草豆蔻煨甘草人參半夏炮各五錢上㕮咀每兩水二盞半生薑五片蔥五莖煎至一盞二分去滓空心服二姜丸治痼冷良薑乾薑炮各三兩上二味等分為末酒糊丸梧子大每服三十丸空心下朮附湯治沉寒痼冷黑附子炮一兩白朮一兩半甘草炙七錢半上為細末每服三五錢水盞半姜五片棗二枚拍破煎至一盞去滓食後溫服
