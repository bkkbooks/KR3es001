body:
  text: 張序先生張元素字潔古易水人也八歲試童經二十七經義登科犯章廟諱出落於是怠仕進遂潛心於醫學二十餘年雖記誦廣博書然治人之術不出人右其夜夢人柯斧長鑿鑿心開竅納書數卷於其中見其題曰內經主治備要駭然驚悟覺心痛只為凶事也不敢語人自是心目洞徹便為傳道軒岐指揮秦越也河間劉守真醫名貫世視之蔑如也異日守真病傷寒八日誤下證頭疼脈緊嘔惡不食門人侍病未知所為請潔古診之至則守真面壁不顧也潔古曰何視我直如此卑也診其脈謂之曰脈病乃爾初服某藥犯某味藥乎曰然潔古曰差之甚也守真遽然起曰何謂也曰某藥味寒下降走太陰陽亡汗不徹故也今脈如此當以某藥服之守真首懇大服其能一服而愈自是名滿天下潔古治病不用古方但云古方新病甚不相宜反以害人每自從病處方刻期見效藥下如攫當時目之曰神醫暇日輯集素問五運六氣內經治要本草藥性名曰醫學啟源以教門生及有醫方三十卷傳於世壬辰遺失存者惟醫學啟源真定李明之門下高弟也請余為序故書之蘭泉老人張吉甫序
