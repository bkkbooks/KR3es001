body:
  text: 卷之下十二用藥備旨一氣味厚薄寒熱陰陽升降之圖注云味為陰味厚為純陰味薄為陰中之陽氣為陽氣厚為純陽氣薄為陽中之陰又曰味厚則泄味薄則通氣厚則發熱氣薄則發泄又曰辛甘發散為陽酸苦湧泄為陰鹹味通泄為陰淡味滲泄為陽升降者天地之氣交也茯苓淡為天之陽陽也陽當上行何謂利水而泄下經云氣之薄者陽中之陰所以茯苓利水而泄下亦不離乎陽之體故人手太陽也麻黃苦為地之陰陰也陰當下行何謂發汗而升上經曰味之薄者陰中之陽所以麻黃髮汗而升上亦不離乎陰之體故入手太陰也附子氣之厚者乃陽中之陽故經云發熱大黃味之厚者乃陰中之陰故經云泄下竹淡為陽中之陰所以利小便也茶苦為陰中之陽所以清頭目也清陽發腠理清之清者也清陽實四肢清之濁者也濁陰歸六腑濁之濁者也濁陰走五臟濁之清者也二藥性要旨苦藥平升微寒平亦升甘辛藥平降甘寒瀉火苦寒瀉濕熱甘苦寒瀉血熱三用藥升降浮沉補瀉法肝膽味辛補酸瀉氣溫補涼瀉注云肝膽之經前後寒熱不同逆順互換入求責法心小腸味鹹補甘瀉氣熱補寒瀉注云三焦命門補瀉同脾胃味甘補苦瀉氣溫熱補寒涼瀉注云溫涼寒熱各從其宜逆順互換入求責法肺大腸味酸補辛瀉氣涼補溫瀉腎膀胱味苦補咸瀉氣寒補熱瀉注云五臟更相平也一臟不平所勝平之此之謂也故云安穀則昌絶谷則亡水去則榮散谷消則衛亡榮散衛亡神無所居又仲景云水入於經其血乃成谷入於胃脈道乃行故血不可不養衛不可不溫血溫衛和榮衛乃行常有天命四臟氣法時補瀉法肝苦急急食甘以緩之甘草心苦緩急食酸以收之五味子脾苦濕急食苦以燥之白朮肺苦氣上逆急食苦以泄之黃芩腎苦燥急食辛以潤之黃柏知母注云開腠理致津液通氣血也肝欲散急食辛以散之川芎以辛補之細辛以酸瀉之白芍藥心欲軟急食鹹以軟之芒硝以咸補之澤瀉以甘瀉之黃耆甘草人參脾欲緩急食甘以緩之甘草以甘補之人參以苦瀉之黃連肺欲收急食酸以收之白芍藥以酸補之五味子以辛瀉之桑白皮腎欲堅急食苦以堅之知母以苦補之黃柏以咸瀉之澤瀉注云此五者有酸辛甘苦咸各有所利或散或收或緩或軟或堅四時五臟病隨五味所宜也五治法綱要氣交變論云五運太過不及夫五運之政猶權衡也高者抑之下者舉之化者應之變者復之此長化收藏之運氣之常也失常則天地四塞矣注云失常之理則天地四時之氣無所運行故動必有靜勝必有復乃天地陰陽之道也以熱治熱法經曰病氣熱甚而與寒藥交爭則寒藥難下故反熱服順其病勢熱勢既休寒性乃發病熱除愈則如承氣湯寒藥反熱服之者是也病寒亦同法也凡治病必求其所在病在上者治上在下者治下故中外臟腑經絡皆然病氣熱則除其熱病氣寒則退其寒六氣同法瀉實補虛除邪養正平則守常醫之道也大法曰前人方法即當時對證之藥也後人用之當體指下脈氣從而加減否則不效余非鄙乎前人而自用也蓋五行相制相兼生化制承之體一時之間變亂無常驗脈處方亦前人之法也厥後通乎理者當以余言為然六用藥用方辨如仲景治表虛制桂枝湯方桂枝味辛熱發散助陽體輕本乎天者親上故桂枝為君芍藥甘草佐之如陽脈澀陰脈弦法當腹中急痛制小建中湯方芍藥為君桂枝甘草佐之一則治其表虛一則治其裡虛是各言其主用也後人之用古方者觸類而長之則知其本而不致差誤矣七去臟腑之火黃連瀉心火黃芩瀉肺火白芍藥瀉肝火知母瀉腎火木通瀉小腸火黃芩瀉大腸火石膏瀉胃火柴胡瀉三焦火須用黃芩佐之柴胡瀉肝火須用黃連佐之膽經亦然黃柏瀉膀胱火又曰龍火膀胱乃水之府故曰龍火也以上諸藥各瀉各經之火不惟止能如此更有治病合為君臣處詳其宜而用之不可執而言也八各經引用太陽經羌活在下者黃柏小腸膀胱也少陽經柴胡在下者青皮膽三焦也陽明經升麻白芷在下者石膏胃大腸也太陰經白芍藥脾肺也少陰經知母心腎也厥陰經青皮在下者柴胡肝包絡也以上十二經之的藥也九五味所用苦以瀉之甘以緩之及發之詳其所宜用之酸以收之辛以散之咸以軟之淡以滲之十用藥各定分兩為君最多臣次之佐使又次之藥之於證所主停者則各等分也十一藥性生熟用法黃連黃芩知母黃柏治病在頭面及手梢皮膚者須酒炒之借酒力上升也咽之下臍之上者須酒洗之在下者生用凡熟升生降也大黃鬚煨恐寒傷胃氣至於烏頭附子須炮去其毒也用上焦藥須酒洗曝乾黃柏知母等寒藥也久弱之人須合之者酒浸曝乾恐寒傷胃氣也熟地黃酒洗亦然當歸酒浸助發散之用也十二藥用根梢法凡根之在上者中半以上氣脈上行以生苗者為根中半以下氣脈下行入土者為梢當知病在中焦用身上焦用根下焦用梢經曰根升梢降十三五臟六腑相生相剋為夫妻子母肺為金肝為木腎為水心為火脾為土生我者為父母我生者為子孫克我者為鬼賊我克者為妻財相生木生火火生土土生金金生水水生木相剋木剋土土剋水水剋火火剋金金剋木假令木生火木乃火之父母火乃木之子孫木剋土木乃土之夫土乃木之妻余皆仿此十四七神心藏神肺藏魄肝藏魂脾藏意與智腎藏精與志十五制方法夫藥有寒熱溫涼之性有酸苦辛咸甘淡之味各有所能不可不通也夫藥之氣味不必同同氣之物其味皆咸其氣皆寒之類是也凡同氣之物必有諸味同味之物必有諸氣互相氣味各有厚薄性用不等制方者必須明其用矣經曰味為陰味厚為純陰味薄為陰中之陽氣為陽氣厚為純陽氣薄為陽中之陰然味厚則泄薄則通氣厚則發熱氣薄則發泄又曰辛甘發散為陽酸苦湧泄為陰鹹味湧泄為陰淡味滲泄為陽凡此之味各有所能然辛能散結潤燥苦能燥濕堅軟咸能軟堅酸能收緩甘能緩急淡能利竅故經曰肝苦急急食甘以緩之心苦緩急食酸以收之脾苦濕急食苦以燥之肺苦氣上逆急食苦以泄之腎苦燥急食辛以潤之開腠理致津液通氣也肝欲散急食辛以散之以辛補之以酸瀉之心欲軟急食鹹以軟之以咸補之以甘瀉之脾欲緩急食甘以緩之以甘補之以苦瀉之肺欲收急食酸以收之以酸補之以辛瀉之腎欲堅急食苦以堅之以苦補之以咸瀉之凡此者是明其氣味之用也若用其味必明其味之可否若用其氣必明其氣之所宜識其病之標本臟腑寒熱虛實微甚緩急而用其藥之氣味隨其證而制其方也是故方有君臣佐使輕重緩急大小反正逆從之制也主病者為君佐君者為臣應臣者為使此隨病之所宜而又贊成方而用之君一臣二奇之制也君二臣四耦之制也去咽喉之病近者奇之治肝腎之病遠者耦之汗者不可以奇下者不可以耦補上治上制以緩緩則氣味薄補下治下制以急急則氣味厚薄者則少服而頻服厚者則多服而頓服又當明五氣之郁木鬱達之謂吐令調達也火鬱發之謂汗令其疏散也土鬱奪之謂下無壅滯也金鬱泄之謂解表利小便也水鬱折之謂制其沖逆也凡此五者乃治病之大要也十六㕮咀藥味古之用藥治病擇淨口嚼水煮服之謂之㕮咀後人則用刀桶內細銼以竹篩齊之十七藥類法象藥有氣味厚薄升降浮沉補瀉主治之法各各不同今詳録之及揀擇制度修合之法俱列於後風升生味之薄者陰中之陽味薄則通酸苦咸平是也防風氣溫味辛療風通用瀉肺實散頭目中滯氣除上焦風邪之仙藥也誤服瀉人上焦元氣主治祕要云味甘純陽太陽經本藥也身去上風梢去下風又云氣味俱薄浮而升陽也其用主治諸風及去濕也去蘆羌活氣微溫味甘苦治肢節疼痛手足太陽經風藥也加川芎治足太陽少陰頭痛透關利節主治祕要云性溫味辛氣味俱薄浮而升陽也其用有五手足太陽引經一也風濕相兼二也去肢節疼痛三也除癰疽敗血四也風濕頭痛五也去黑皮並腐爛者銼用升麻氣平味微苦足陽明胃足太陰脾引經藥若補其脾胃非此為引用不能補若得蔥白香芷之類亦能走手陽明太陽能解肌肉間熱此手足陽明經傷風之的藥也主治祕要云性溫味辛氣味俱薄浮而升陽也其用有四手足陽明引經一也升陽於至陰之下二也陽明經分頭痛三也去風邪在皮膚及至高之上四也又云甘苦陽中之陰脾痹非升麻不能除刮去黑皮腐爛者用里白者佳柴胡氣味平微苦除虛勞煩熱解散肌熱去早辰潮熱此少陽厥陰引經藥也婦人産前産後必用之藥也善除本經頭痛非他藥所能止治心下痞胸膈中痛主治祕要云味微苦性平微寒氣味俱輕陽也升也少陽經分藥能引胃氣上升以發散表熱又云苦為純陽去寒熱往來膽痹非柴胡梢不能除去蘆用葛根氣平味甘除脾胃虛熱而渴又能解酒之毒通行足陽明之經主治祕要云味甘性寒氣味俱薄體輕上行浮而微降陽中陰也其用有四止渴一也解酒二也發散表邪三也發散小兒瘡疹難出四也益陽生津液不可多用恐損胃氣去皮用威靈仙氣溫味苦甘主諸風濕冷宣通五臟去腹內瘕滯腰膝冷痛及治傷損主治祕要云味甘純陽去太陽之風鐵腳者佳去蘆用細辛氣溫味大辛治少陰經頭痛如神當少用之獨活為之使主治祕要云味辛性溫氣厚於味陽也止諸陽頭痛諸風通用之辛熱溫少陰之經散水寒治內寒又云味辛純陽止頭痛去蘆並葉華山者佳獨活氣微溫味甘苦平足少陰腎引經藥也若與細辛同用治少陰經頭痛一名獨搖草得風不搖無風自動主治祕要云味辛而苦氣溫性味薄而升治風須用及能燥濕經云風能勝濕又云苦頭眩目運非此不能除去皮淨用香白芷氣溫味大辛治手陽明頭痛中風寒熱解利藥也以四味升麻湯中加之通行手足陽明經主治祕要云味辛性溫氣味俱輕陽也陽明經引經之藥治頭痛在額及療風通用去肺經風又云苦辛陽明本藥鼠黏子氣平味辛主風毒腫消利咽膈吞一枚可出癰疽瘡頭主治祕要云辛溫潤肺散氣搗細用之桔梗氣微溫味辛苦治肺利咽痛利肺中氣主治祕要云味涼而苦性微溫味厚氣輕陽中陰也肺經之藥也利咽嗌胸膈治氣以其色白故屬於肺此用色之法也乃散寒嘔若咽中痛非此不能除又云辛苦陽中之陽謂之舟楫諸藥中有此一味不能下沉治鼻塞去蘆米泔浸一宿用藁本氣溫味大辛此太陽經風藥治寒氣鬱結於本經治頭痛腦痛齒痛主治祕要云味苦性微溫氣厚味薄而升陽也太陽頭痛必用之藥又云辛苦純陽足太陽本經藥也頂巔痛非此不能除川芎氣味辛溫補血治血虛頭痛之聖藥也妊婦胎動加當歸二味各二錢水二盞煎至一盞服之神效主治祕要云性溫味辛苦氣厚味薄浮而升陽也其用有四少陽引經一也諸頭痛二也助清陽之氣三也去濕氣在頭四也又云味辛純陽少陽經本藥搗細用蔓荊子氣清味辛溫治太陽頭痛頭沉昏悶除目暗散風邪之藥也胃虛人不可服恐生痰疾主治祕要云苦甘陽中之陰涼諸經之血熱止頭痛主目睛內痛洗淨用秦艽氣微寒味苦主寒熱邪氣風濕痹下水利小便療骨蒸治口噤及腸風瀉血主治祕要云性平味鹹養血榮筋中風手足不遂者用之又云陰中微陽去手足陽明經下牙痛口瘡毒及除本經風濕去蘆淨用天麻氣平味苦治頭風主諸風濕痹四肢拘急小兒驚癇除風氣利腰膝強筋力主治祕要云其苗謂之定風草麻黃氣溫味苦發太陽太陰經汗主治祕要云性溫味甘辛氣味俱薄體輕清而浮升陽也其用有四去寒邪一也肺經本藥二也發散風寒三也去皮膚之寒濕及風四也又云味苦純陽去營中寒去根不銼細微搗碎煮二三沸去上沫不然令人煩心荊芥氣溫味辛苦辟邪毒利血脈宣通五臟不足氣主治祕要云能發汗通關節除勞渴冷搗和醋封毒腫去枝莖以手搓碎用薄荷氣溫味辛苦能發汗通關節解勞乏與薤相宜新病瘥人不可多食令人虛汗出不止主治祕要云性涼味辛氣味俱薄浮而升陽也去高顛及皮膚風熱去枝莖手搓碎用前胡氣微寒味苦主痰滿胸脅中痞心腹結氣治傷寒寒熱推陳致新明目益精銼用熱浮長氣之厚者陽中之陽氣厚則發熱辛甘溫熱是也黑附子氣熱味大辛其性走而不守亦能除腎中寒甚以白朮為佐謂之朮附湯除寒濕之聖藥也治濕藥中宜少加之通行諸經引用藥也及治經閉主治祕要云辛純陽治脾中大寒又云性大熱味辛甘氣厚味薄輕重得宜可升可降陽也其用有三去臟腑沉寒一也補助陽氣不足二也溫暖脾胃三也然不可多用慢火炮製用乾薑氣熱味大辛治沉寒痼冷腎中無陽脈氣欲絶黑附子為引用水同煎二物薑附湯是也亦治中焦有寒主治祕要云性熱味辛氣味俱厚半沉半浮可升可降陽中陰也其用有四通心氣助陽一也去臟腑沉寒二也發散諸經之寒氣三也治感寒腹疼四也又云辛溫純陽內經云寒淫所勝以辛散之此之謂也水洗慢火炙制銼用乾生薑氣味溫辛主傷寒頭痛鼻塞上氣止嘔吐治咳嗽生與干同治與半夏等分治心下急痛銼用川烏頭氣熱味大辛療風痹半身不遂引經藥也主治祕要云性熱味辛甘氣厚味薄浮而升陽也其用有六除寒疾一也去心下堅痞二也溫養臟腑三也治諸風四也破積聚滯氣五也治感寒腹痛六也先以慢火炮製去皮碎用良薑氣熱味辛主胃中逆冷霍亂腹痛翻胃吐食轉筋瀉利下氣消食主治祕要云純陽健脾胃碎用肉桂氣熱味大辛補下焦火熱不足治沉寒痼冷之病及表虛自汗春夏二時為禁藥也主治祕要云若純陽滲泄止渴又云甘辛陽大熱去營衛中之風寒去皮搗細用桂枝氣熱味辛甘仲景治傷寒證發汗用桂枝者乃桂條非身干也取其輕薄而能發散今又有一種柳桂乃桂枝嫩小枝條也尤宜入治上焦藥用也主治祕要云性溫味辛甘氣味俱薄體輕而上行浮而升陽也其用有四治傷風頭痛一也開腠理二也解表三也去皮膚風濕四也草豆蔻氣熱味大辛治風寒客邪在於胃口之上善去脾胃寒治客寒令人心胃痛主治祕要云純陽益脾胃去寒面裹煨熟去麵皮搗細用丁香氣味辛溫溫脾胃止霍亂消痃癖氣脹及胃腸內冷痛壯陽暖腰膝殺酒毒主治祕要云純陽去胃寒厚朴氣溫味辛能除腹脹若元氣虛弱雖腹脹宜斟酌用之寒腹脹是也大熱藥中兼用結者散之乃神藥也誤服脫人元氣切禁之紫色者佳主治祕要云性溫味苦辛氣厚味厚體重濁而微降陰中陽也其用有三平胃氣一也去腹脹二也孕婦忌之三也又云陽中之陰去腹脹厚腸胃去粗皮薑汁製用益智仁氣熱味大辛治脾胃中寒邪和中益氣治人多唾當於補中藥內兼用之不可多服去皮搗用木香氣味辛苦除肺中滯氣若療中下焦氣結滯須用檳榔為使主治祕要云性熱味辛苦氣味俱厚沉而降陰也其用調氣而已又曰辛純陽以和胃氣廣州者佳白豆蔻氣熱味大辛蕩散肺中滯氣主積冷氣寬膈止吐逆久反胃消穀下氣進飲食主治祕要云性大溫味辛氣味俱薄輕清而升陽也其用有五肺金本藥一也散胸中滯氣二也治感寒腹痛三也溫暖脾胃四也赤眼暴發白睛紅者五也又云辛純陽去太陽經目內大眥紅筋去皮搗用川椒氣溫味辛主邪氣溫中除寒痹堅齒髮明目利五臟凡用須炒去汗又去含口者主治祕要云辛陽明目之劑手搓細用吳茱萸氣熱味辛治寒在咽喉隘塞胸中經云咽膈不通食不可下食則嘔令人口開目瞪寒邪所結氣不得上下此病不已令人寒中腹滿膨脹下利寒氣諸藥不可代也主治祕要云性熱味辛氣味俱厚半沉半浮陰中之陽也氣浮而味降其用有四去胸中寒一也止心痛二也治感寒腹痛三也消宿酒為白豆蔻之佐四也又云辛陽中之陰溫中下氣洗去苦味曬乾用茴香氣平味辛破一切臭氣調中止嘔下食須炒黃色搗細用玄胡索氣溫味辛破血治氣婦人月事不調小腹痛甚溫暖腰膝破散癥瘕搗細用縮砂仁氣溫味辛治脾胃氣結滯不散主虛勞冷瀉心腹痛下氣消食搗細用紅藍花氣溫味辛主産後口噤血暈腹內惡血不盡絞痛破留血神驗酒浸佐當歸生新血神麯氣暖味甘消食治脾胃食不化須用於脾胃藥中少加之主治祕要云辛陽益胃氣炒黃色用濕化成中央戊土其本氣平其兼氣溫涼寒熱在人以胃應之己土其本味淡其兼味辛甘鹹苦在人以脾應之黃耆氣溫味甘平治虛勞自汗補肺氣實皮毛瀉肺中火脈弦自汗善治脾胃虛弱瘡瘍血脈不行內托陰證瘡瘍必用之藥也主治祕要云氣溫味甘氣薄味厚可升可降陰中陽也其用有五補諸虛不足一也益元氣二也去肌熱三也瘡瘍排膿止痛四也壯脾胃五也又云甘純陽益胃氣去諸經之痛去蘆並皺銼用人參氣溫味甘治脾肺陽氣不足及肺氣喘促短氣少氣補中緩中瀉肺脾胃中火邪善治短氣非升麻為引用不能補上升之氣升麻一分人參三分可為相得也若補下焦元氣瀉腎中之火邪茯苓為之使甘草梢子生用為君善去莖中痛或加苦楝酒煮玄胡索為主尤妙主治祕要云性溫味甘氣味俱薄浮而升陽也其用有三補元氣一也止渴二也生津液三也肺實忌之又云甘苦陽中之陽也補胃嗽喘勿用短氣用之去蘆甘草氣味甘生大涼火炙之則溫能補三焦元氣調和諸藥相協共為力而不爭性緩善解諸急故有國老之稱主治祕要云性寒味甘氣薄味厚可升可降陰中陽也其用有五和中一也補陽氣二也調諸藥三也能解其太過四也去寒邪五也腹脹則忌之又云甘苦陽中陰也純陽養血補胃梢子去腎莖之痛胸中積熱非梢子不能除去皮碎用當歸氣溫味甘能和血補血尾破血身和血主治祕要云性溫味辛氣厚味薄可升可降陽也其用有三心經藥一也和血二也治諸病夜甚三也又云甘辛陽中微陰身和血梢破血治上治外酒浸洗糖黃色嚼之大辛可能潰堅與菖蒲海藻相反又云用溫水洗去土酒製過或焙或曬乾血病須去蘆頭用熟地黃氣寒味苦酒曬熏如烏金假酒力則微溫補血虛不足虛損血衰之人須用善黑鬚發忌蘿蔔主治祕要云性溫味苦甘氣薄味厚沉而降陰也其用有五益腎水真陰一也和産後氣血二也去臍腹急痛三也養陰退陽四也壯水之源五也又云苦陰中之陽治外治上酒浸銼細用半夏氣微寒味辛平治寒痰及形寒飲冷傷肺而咳大和胃氣除胃寒進飲食治太陰痰厥頭痛非此不能除主治祕要云性溫味辛苦氣味俱薄沉而降陰中陽也其用有四燥脾胃濕一也化痰二也益脾胃之氣三也消腫散結四也渴則忌之又云平陰中之陽除胸中痰涎湯洗七次乾用白朮氣溫味甘能除濕益燥和中益氣利腰臍間血除胃中熱主治祕要云性溫味微苦氣味俱薄浮而升陽也其用有九溫中一也去脾胃中濕二也除脾胃熱三也強脾胃進飲食四也和脾胃生津液五也主肌熱六也治四肢困倦目不欲開怠惰嗜臥不思飲食七也止渴八也安胎九也蒼朮氣溫味甘主治與白朮同若除上濕發汗功最大若補中焦除濕力少主治祕要云其用與白朮同但比之白朮氣重而體沉治脛足濕腫加白朮泔浸刮去皮用橘皮氣溫味苦能益氣加青皮減半去滯氣推陳致新若補脾胃不去白若理胸中滯氣去白主治祕要云性寒味辛氣薄味厚浮而升陽也其用有三去胸中寒邪一也破滯氣二也益脾胃三也少用同白朮則益脾胃其多及獨用則損人又云苦辛益氣利肺有甘草則補肺無則瀉肺青皮氣溫味辛主氣滯消食破積主治祕要云性寒味苦氣味俱厚沉而降陰也其用有五足厥陰少陽之分有病則用之一也破堅癖二也散滯氣三也去下焦諸濕四也治左脅有積氣五也藿香氣微溫味甘辛療風水去惡氣治脾胃吐逆霍亂心病主治祕要云性溫味苦氣厚味薄浮而升陽也其用助胃氣又云甘苦純陽補胃氣進飲食去枝莖用葉以手搓用檳榔氣溫味辛治後重如神性如鐵石之沉重能墜諸藥至於下主治祕要云性溫氣味苦氣薄味厚沉而降陰中陽也其用破滯氣下行又云辛純陽破滯氣泄胸中至高之氣廣朮氣溫味苦辛主心膈痛飲食不消破痃癖氣最良火炮開用京三稜氣平味苦主心膈痛飲食不消破氣治老癖癥瘕結塊婦人血脈不調心腹刺痛主治祕要云味苦陰中之陽破積氣損真氣虛人不用火炮製使阿膠氣微溫味甘平主心腹疼痛血崩補虛安胎堅筋骨和血脈益氣止痢主治祕要云性平味淡氣味俱薄浮而升陽也能補肺氣不足慢火炮脆搓細用訶子氣溫味苦主腹脹滿不下飲食消痰下氣通利津液破胸膈結氣治久痢赤白腸風去核搗細用桃仁氣溫味甘苦治大便血結血祕血燥通潤大便七宣丸中用之專療血結破血湯浸去皮尖研如泥用杏仁氣溫味甘苦除肺中燥治風燥在於胸膈主治祕要云性溫味苦而甘氣薄味厚濁而沉降陰也其用有三潤肺氣一也消宿食二也升滯氣三也麩炒去皮尖用大麥蘖氣溫味鹹補脾胃虛寬腸胃搗細炒黃色取面用之紫草氣溫味苦主心腹邪氣五疳利九竅補中益氣通水道療腹腫脹滿去土用茸銼細用蘇木氣平味甘鹹主破血産後血脹悶欲死者排膿止痛消癰腫瘀血婦人月經不調及血暈口噤主治祕要云性涼味微辛發散表裡風氣又云甘鹹陽中之陰破死血銼細用燥降收氣之薄者陽中之陰氣薄則發泄辛甘淡平寒涼是也茯苓氣平味甘止消渴利小便除濕益燥利腰臍間血和中益氣為主治小便不通溺黃或赤而不利如小便利或數服之則損人目如汗多人服之損元氣夭人壽醫言赤瀉白補上古無此説主治祕要云性溫味淡氣味俱薄浮而升陽也其用有五止瀉一也利小便二也開腠理三也除虛熱四也生津液五也刮皮搗細用澤瀉氣平味甘除濕之聖藥也治小便淋瀝去陰間汗無此疾服之令人目盲主治祕要云味鹹性寒氣味俱厚沉而降陰也其用有四入腎經一也去舊水養新水二也利小便三也消腫瘡四也又云咸陰中微陽滲泄止渴搗細用豬苓氣平味甘大燥除濕比諸淡滲藥大燥亡津液無濕證勿服主治祕要云性平味淡氣味俱薄升而微降陽也其用與茯苓同又云甘苦純陽去心中懊憹去黑皮里白者佳滑石氣寒味甘治前陰竅澀不利性沉重能泄氣上令下行故曰滑則利竅不比與淡滲諸藥同白者佳搗細用色紅者服之令人淋瞿麥氣寒味苦辛主關格諸癃結小便不通治癰腫排膿明目去翳破胎墮胎下閉血逐膀胱邪熱主治祕要云陽中之陰利小便為君去枝用穗車前子氣寒味甘陰癃氣閉利水道通小便除濕痹肝中風熱沖目赤痛搗細用木通氣平味甘主小便不通導小腸中熱刮去粗皮用燈草通草氣平味甘通陰竅澀不利利小便除水腫癃閉五淋主治祕要云辛甘陽也瀉肺利小便銼細用五味子氣溫味酸大益五臟氣孫真人曰五月常服五味子以補五臟之氣遇夏月季夏之間令人困乏無力無氣以動與黃耆人參麥門冬少加黃柏銼煎湯服之使人精神元氣兩足筋力湧出生用白芍藥氣微寒味酸補中焦之藥炙甘草為輔治腹中痛如夏月腹痛少加黃芩若惡寒腹痛加肉桂一分白芍藥二分炙甘草一分半此仲景神品藥也如冬月大寒腹痛加桂一錢半水二盞煎至一盞服主治祕要云性寒味酸氣厚味薄升而微降陽中陰也其用有六安脾經一也治腹痛二也收胃氣三也止瀉利四也和血脈五也固腠理六也又云酸苦陰中之陽白補赤散瀉肝補脾胃酒浸引經止中部腹痛去皮用桑白皮氣寒味苦酸主傷中五癆羸瘦補虛益氣瀉肺氣止吐血熱渴消水腫利水道去皮用天門冬氣寒味微苦保肺氣治血熱侵肺上喘氣促加人參黃耆用之為主神效主治祕要云甘苦陽中之陰湯浸曬乾去心用麥門冬氣寒味微苦甘治肺中伏火脈氣欲絶加五味子人參二味為生脈散補肺中元氣不足須用之主治祕要云甘陽中微陰引經酒浸治經枯乳汁不下湯洗去心用犀角氣寒味苦酸主傷寒瘟疫頭痛安心神止煩渴霍亂明目鎮驚治中風失音小兒麩豆風熱驚癇鎊末用烏梅氣寒味酸主下氣除熱煩滿安心調中治痢止渴以鹽豉為白梅亦入除痰藥去核用牡丹皮氣寒味苦治腸胃積血及衄血吐血必用之藥是犀角地黃湯中一味也主治祕要云辛苦陰中之陽涼骨熱銼用地骨皮氣寒味苦解骨蒸肌熱主消渴風濕痹堅筋骨主治祕要云陰涼血去骨用皮碎用枳殼氣寒味苦治胸中痞塞泄肺氣主治祕要云性寒味苦氣厚味薄浮而升微降陰中陽也其用有四破心下堅痞一也利胸中氣二也化痰三也消食四也然不可多用又云苦酸陰中微陽破氣麩炒去瓤用琥珀氣平味甘定五臟定魂魄消瘀血通五淋主治祕要云甘陽利小便清肺連翹氣平味苦主寒熱瘰癧諸惡瘡腫除心中客熱去胃蟲通五淋主治祕要云性涼味苦氣味俱薄輕清而浮升陽也其用有三瀉心經客熱一也去上焦諸熱二也瘡瘍須用三也手搓用之枳實氣寒味苦除寒熱去結實消痰癖治心下痞逆氣脅下痛主治祕要云氣味升降與枳殼同其用有四主心下痞一也化心胸痰二也消宿食散敗血三也破堅積四也又云純陽去胃中濕去瓤麩炒用寒沉藏味之厚者陰中之陰味厚則泄酸苦咸寒是也大黃味苦氣寒其性走而不守瀉諸實熱不通下大便蕩滌腸胃中熱專治不大便主治祕要云性寒味苦氣味俱厚沉而降陰也其用有四去實熱一也除下焦濕二也推陳致新三也消宿食四也用之須酒浸煨熟寒因熱用也又云苦純陰熱淫所勝以苦瀉之酒浸入太陽酒洗入陽明余經不用去皮銼用黃柏氣寒味苦治腎水膀胱不足諸痿厥腰腳無力於黃耆湯中少加用之使兩足膝中氣力湧出痿軟即時去矣蜜炒此一味為細末治口瘡如神癱瘓必用之藥也主治祕要云性寒味苦氣味俱厚沉而降陰也其用有六瀉膀胱龍火一也利小便熱結二也除下焦濕腫三也治痢先見血四也去臍下痛五也補腎氣不足壯骨髓六也二制則治上焦單制則治中焦不制則治下焦也又云苦厚微辛陰中之陽瀉膀胱利下竅去皮用黃芩氣寒味微苦治肺中濕熱療上熱目中腫赤瘀血壅盛必用之藥泄肺中火邪上逆於膈上補膀胱之寒水不足乃滋其化源也主治祕要云性涼味苦甘氣厚味薄浮而降陽中陰也其用有九瀉肺經熱一也夏月須用二也去諸熱三也上焦及皮膚風熱風濕四也婦人産後養陰退陽五也利胸中氣六也消膈上痰七也除上焦及脾諸濕八也安胎九也單制二制不制分上中下也又云苦陰中微陽酒炒上行主上部積血非此不能除肺苦氣上逆急食苦以泄之正謂此也去皮銼用黃連氣寒味苦瀉心火除脾胃中濕熱治煩躁噁心鬱熱在中焦兀兀欲吐心下痞滿必用藥也仲景治九種心下痞五等瀉心湯皆用之主治祕要云性寒味苦氣味俱厚可升可降陰中陽也其用有五瀉心熱一也去上焦火二也諸瘡必用三也去風濕四也赤眼暴發五也去須用石膏氣寒味辛甘治足陽明經中熱發熱惡熱躁熱日晡潮熱自汗小便濁赤大渴引飲身體肌肉壯熱苦頭痛之藥白虎湯是也善治本經頭痛若無此有餘之證醫者不識而誤用之則不可勝救也主治祕要云性寒味淡氣味俱薄體重而沉降陰也乃陽明經大寒藥能傷胃氣令人不食非腹有極熱者不宜輕用又云辛甘陰中陽也止陽明頭痛胃弱者不可服治下牙痛用香芷為引搗細用草龍膽氣寒味大苦治兩目赤腫睛脹瘀肉高起痛不可忍以柴胡為主龍膽為使治眼中疾必用藥也主治祕要云性寒味苦辛氣味俱厚沉而降陰也其用有四除下部風濕一也除濕熱二也臍下以至足腫痛三也寒濕腳氣四也其用與防己同又云苦純陽酒浸上行去蘆用生地黃氣寒味苦涼血補血補腎水真陰不足此藥大寒宜斟酌用之恐損人胃氣主治祕要云性寒味苦氣薄味厚沉而降陰也其用有三涼血一也除皮膚燥二也去諸濕熱三也又云陰中微陽酒浸上行知母氣寒味大辛治足陽明火熱大補益腎水膀胱之寒主治祕要云性寒味苦氣味俱厚沉而降陰也其用有三瀉腎經火一也作利小便之佐使二也治痢疾臍下痛三也又云苦陰中微陽腎經本藥欲上頭引經皆酒炒刮去毛里白者佳漢防己氣寒味大苦療胸中以下至足濕熱腫盛腳氣補膀胱去留熱通行十二經主治祕要云辛苦陰也泄濕氣去皮淨用茵陳蒿氣寒味苦平治煩熱主風濕風熱邪氣熱結黃疸通身發黃小便不利主治祕要云苦甘陰中微陽治傷寒發黃去枝莖用葉手搓朴硝氣寒味苦辛除寒熱邪氣六腑積聚結固血癖胃中飲食熱結去血閉停痰痞滿消毒主治祕要云芒硝性寒味鹹氣薄味厚沉而降陰也其用有三治熱淫於內一也去腸內宿垢二也破堅積熱塊三也婦人有孕忌之又云鹹寒純陰熱淫於內治以鹹寒正謂此也栝蔞根氣寒味苦主消渴身熱煩滿大熱補虛安中通月水消腫毒瘀血及熱癤毒主治祕要云性寒味苦陰也能消煩渴又云苦純陰一心中枯渴非此藥不能除牡蠣氣寒味鹹平主傷寒寒熱溫瘧女子赤白帶止汗止心痛氣結大小腸治心脅痞主治祕要云咸軟痞積燒白搗用玄參氣寒味苦治心中懊憹煩而不能眠心神顛倒欲絶血滯小便不利苦參氣寒味苦足少陰腎經之君藥也治本經須用主治祕要云苦陰氣沉逐濕川楝子氣寒味苦平主傷寒大熱煩躁殺三蟲疥瘍通利大小便之疾主治祕要云入心止下部腹痛香豉氣寒味苦主傷寒頭痛煩躁滿悶生用之主治祕要云苦陰去心中懊憹地榆氣微寒味甘酸主婦人乳産七傷帶下經血不止血崩之病除惡血止痛疼療腸風泄血小兒疳痢性沉寒入下焦治熱血痢主治祕要云性微寒味微苦氣味俱薄其體沉而降陰中陽也專治下焦血又云甘苦陽中微陰治下部血去蘆用梔子性寒味苦氣薄味厚輕清上行氣浮而味降陽中陰也其用有四去心經客熱一也除煩躁二也去上焦虛熱三也治風熱四也又云苦純陽止渴續添巴豆性熱味苦氣薄味厚體重而沉降陰也其用有三導氣消積一也去臟腑停寒二也消化寒涼及生冷硬物所傷三也又云辛陽去胃中寒積白僵蠶性微溫味微辛氣味俱薄體輕而浮升陽也去皮膚間諸風生薑性溫味辛甘氣味俱厚清浮而生升陽也其用有四製厚朴半夏毒一也發散風邪二也溫中去濕三也作益胃脾藥之佐四也杜仲性溫味辛甘氣味俱薄沉而降陰也其用壯筋骨及足弱無力行以上諸藥此大略言之以為制方之階也其用有未盡者十八法象余品蜀葵花冷陰中之陽赤治赤帶白治白帶梧桐淚咸瘰癧非此不能除鬱金辛苦純陽涼心款冬花辛苦純陽溫肺止嗽香附子甘陽中之陰快氣大戟苦甘陰中微陽瀉肺損真氣白芨苦甘陽中之陰止肺血澀白蘞同甘遂苦純陽水結胸中非此不能除蜀漆辛純陽破血射干苦陽中之陰去胃中癰瘡天南星苦辛去上焦痰及頭眩運御米殼酸澀固收正氣胡蘆巴陰治元氣虛寒及腎經虛冷馬兜鈴苦陰中之陽主肺濕熱清肺氣補肺白附子陽溫主血痹行藥勢槐花苦陰氣薄涼大腸熱槐實苦酸同上茯神陽療風眩風虛沉香陽補腎檀香陽主心腹痛霍亂中惡引胃氣上升進食乳香陽補腎竹葉苦陰中微陽涼心經山茱萸酸陽中之陰溫肝郁李仁苦辛陰中之陽破血潤燥金鈴子酸苦陰中之陽心暴痛非此不能除即川楝子草豆蔻辛陽益脾胃去寒紅花苦陰中之陽入心養血硃砂心熱非此不能除赤石脂甘酸陰中之陽固脫甘菊苦養目血茜根陰中微陽去諸死血王不留行甘苦陽中之陰下乳引導用之艾葉苦陰中之陽溫胃硇砂咸破堅癖獨不用十九五行制方生克法附湯例夫木火土金水此制方相生相剋之法也老於醫者能之風製法肝木酸春生之道也失常則病矣風淫於內治以辛涼佐以苦辛以甘緩之以辛散之暑製法心火苦夏長之道也失常則病矣熱淫於內治以鹹寒佐以甘苦以酸收之以苦發之濕製法脾土甘中央化成之道也失常則病矣濕淫於內治以苦熱佐以鹹淡以苦燥之以淡泄之燥製法肺金辛秋收之道也失常則病矣燥淫於內治以苦溫佐以甘辛以辛潤之以苦下之寒製法腎水咸冬藏之道也失常則病矣寒淫於內治以甘熱佐以苦辛以辛散之以苦堅之注云酸苦甘辛鹹即肝木心火脾土肺金腎水之本也四時之變五行化生各順其道違則病生聖人設法以制其變謂如風淫於內即是肝木失常也火隨而熾治以辛涼是為辛金克其木涼水沃其火其治法例皆如此下之二方非為治病而設此乃教人比證立方之道容易通曉也當歸拈痛湯治濕熱為病肢節煩痛肩背沉重胸膈不利遍身疼下注於脛腫痛不可忍經云濕淫於內治以苦溫羌活苦辛透關利節而勝濕防風甘辛溫散經絡中留濕故以為君水性潤下升麻葛根苦辛平味之薄者陰中之陽引而上行以苦發之也白朮苦甘溫和中除濕蒼朮體輕浮氣力雄壯能去皮膚腠理之濕故以為臣血壅而不流則痛當歸身辛溫以散之使氣血各有所歸人參甘草甘溫補脾養正氣使苦藥不能傷胃仲景云濕熱相合肢節煩痛苦參黃芩知母茵陳者乃苦以泄之也凡酒製藥以為因用治濕不利小便非其治也豬苓甘溫平澤瀉鹹平淡以滲之又能導其留飲故以為佐氣味相合上下分消其濕氣得以宣通矣羌活半兩防風三錢二味為君升麻一錢葛根二錢白朮一錢蒼朮三錢當歸身三錢人參二錢甘草五錢苦參酒浸二錢黃芩一錢炒知母三錢酒洗茵陳五錢酒炒豬苓三錢澤瀉三錢上銼如麻豆大每服一兩水二盞半先以水拌濕候少時煎至一盞去滓溫服待少時美膳壓之天麻半夏湯治風痰內作胸膈不利頭眩目黑兀兀欲吐上熱下寒不得安臥遂處此方云眼黑頭眩虛風內作非天麻不能治故以為君偏頭痛乃少陽也非柴胡不能治黃芩苦寒酒製炒佐柴胡治上熱又為引用故以為臣橘皮苦辛溫炙甘草甘溫補中益氣為佐生薑半夏辛溫以治風痰白茯苓甘平利小便導濕熱引而下行故以為使不數服而見愈天麻一錢君柴胡七分黃芩五分酒製橘皮七分去白半夏一錢白茯苓五分甘草五分上銼碎如麻豆大都作一服水二盞生薑三片煎至一盞去滓溫服
